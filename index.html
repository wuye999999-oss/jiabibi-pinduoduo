<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>价比比</title><style>body{margin:0;background:#f5f5f7;color:#111;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.app{max-width:860px;margin:auto;padding:28px 16px 48px}.hero{text-align:center}.logo{font-size:52px;font-weight:950;margin:18px 0 6px}.sub,.muted,.status{color:#86868b}.search{display:flex;gap:8px;background:white;border-radius:28px;padding:10px;margin:24px auto 14px;box-shadow:0 16px 48px rgba(0,0,0,.07);max-width:680px}input{flex:1;border:1px solid #e8e8ed;border-radius:20px;padding:15px 16px;font-size:17px}button{border:0;background:#111;color:white;border-radius:20px;padding:0 22px;font-weight:900}.card{background:white;border-radius:28px;padding:20px;margin:14px 0;box-shadow:0 16px 48px rgba(0,0,0,.07)}.platforms{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.p{border:1px solid #e8e8ed;border-radius:16px;text-align:center;padding:12px;background:#fff}.pn{font-size:12px;color:#86868b}.pp{font-weight:900;margin-top:5px}.pe{font-size:12px;color:#b0b0b5;margin-top:5px}.ok{color:#14813f}.warn{color:#ad6800}.price{font-size:48px;font-weight:950;margin:14px 0 6px}.buy{background:#0071e3;border-radius:999px;padding:12px 18px;margin-top:12px}.empty{text-align:center;color:#86868b;line-height:1.6}.title{font-size:24px;font-weight:950}.badge{display:inline-block;background:#f2f2f7;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#555}@media(max-width:560px){.platforms{grid-template-columns:repeat(2,1fr)}.logo{font-size:42px}.search button{padding:0 18px}}</style></head><body><div class="app"><section class="hero"><h1 class="logo">价比比</h1><p class="sub">拼多多 / 京东 / 淘宝 / 抖音，真实接口返回才展示价格。</p><form id="form" class="search"><input id="keyword" placeholder="输入商品名或粘贴商品链接"><button>比价</button></form></section><div id="status" class="status">正在读取平台状态...</div><main id="summary"></main></div><script>const API='https://jiabibi-api.onrender.com';const PL=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];let provider={},goods=[],lastQ='';const $=id=>document.getElementById(id);const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');const canon=p=>{p=String(p||'').toLowerCase();if(['pdd','pinduoduo','拼多多'].includes(p))return'pdd';if(['jd','jingdong','京东'].includes(p))return'jd';if(['tb','taobao','tmall','淘宝','天猫'].includes(p))return'tb';if(['dy','douyin','抖音'].includes(p))return'douyin';return p};const price=i=>Number(i?.coupon_price_yuan||i?.final_price||i?.min_group_price_yuan||i?.price||999999);function snapshot(){return `<section class="card"><div class="title">四平台状态</div><div class="muted">京东固定显示；没返回商品时显示“暂无”，不是隐藏。</div><div class="platforms">${PL.map(([p,n])=>{let arr=goods.filter(x=>x.platform===p).sort((a,b)=>price(a)-price(b));let top=arr[0];let st=provider[p]||{};let ok=st.configured||st.search||st.link||st.ok||arr.length;return `<div class="p"><div class="pn">${n}</div>${top?`<div class="pp">¥${yuan(price(top))}</div>`:`<div class="pe">暂无</div>`}<div class="pe ${ok?'ok':'warn'}">${ok?'已接入':'待接入'}${arr.length?'｜'+arr.length+'个':''}</div></div>`}).join('')}</div></section>`}function renderList(){let rows=goods.slice().sort((a,b)=>price(a)-price(b)).slice(0,12).map((x,i)=>`<section class="card"><span class="badge">${(PL.find(p=>p[0]===x.platform)||[])[1]||x.platform}</span><div class="price">¥${yuan(price(x))}</div><div><b>${x.goods_name||''}</b></div><div class="muted">${x.shop_name||x.brand_name||''}</div><button class="buy" onclick="buy(${i})">去购买</button></section>`).join('');return rows||'<section class="card empty">暂无可靠商品返回，但上方四个平台会一直显示。</section>'}function draw(){ $('summary').innerHTML=snapshot()+renderList()}async function loadProviders(){try{let d=await fetch(API+'/api/providers/status',{cache:'no-store'}).then(r=>r.json());(d.providers||[]).forEach(p=>provider[canon(p.platform)]=p);$('status').textContent='平台状态已读取：京东已固定显示。'}catch(e){$('status').textContent='平台状态读取失败，仍固定显示四个平台。'}draw()}async function search(q){q=(q||$('keyword').value||'').trim();if(!q)return;lastQ=q;$('keyword').value=q;$('status').textContent='正在比价...';goods=[];draw();try{let d=await fetch(API+'/api/search?platform=all&page_size=50&keyword='+encodeURIComponent(q),{cache:'no-store'}).then(r=>r.json());goods=(d.goods_list||[]).map(x=>Object.assign({},x,{platform:canon(x.platform||x.provider||x.source_platform)})).filter(x=>PL.some(p=>p[0]===x.platform));$('status').textContent='已返回 '+goods.length+' 个候选。'}catch(e){$('status').textContent='搜索失败：'+e.message}draw()}function jdSearch(i){return 'https://search.jd.com/Search?keyword='+encodeURIComponent(i?.goods_name||lastQ||'商品')+'&enc=utf-8'}async function buy(idx){let i=goods[idx];if(!i)return;let p=i.platform,url=i.material_url||i.url||i.item_url||i.product_url||'';try{if(p==='jd'){let d=await fetch(API+'/api/jd/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sku_id:i.sku_id||i.skuId||i.goods_id||'',material_url:url,coupon_url:i.coupon_url||i.couponUrl||''})}).then(r=>r.json());url=d.url||d.material_url||d.click_url||d.short_url||d.mobile_url||url||jdSearch(i)}else if(p==='tb'){url=url||'https://s.m.taobao.com/h5?q='+encodeURIComponent(i.goods_name||lastQ||'商品')}else if(p==='douyin'){url=url||'https://www.douyin.com/search/'+encodeURIComponent(i.goods_name||lastQ||'商品')}else if(p==='pdd'&&i.goods_sign){let d=await fetch(API+'/api/pdd/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goods_sign:i.goods_sign,goods_id:i.goods_id})}).then(r=>r.json());url=d.mobile_short_url||d.short_url||d.mobile_url||d.url||url}if(url)location.href=url}catch(e){if(p==='jd')location.href=jdSearch(i)}}$('form').onsubmit=e=>{e.preventDefault();search()};loadProviders().then(()=>search('小米 充电宝'));</script></body></html>
