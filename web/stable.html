<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>价比比</title><style>:root{--bg:#f5f5f7;--card:#fff;--text:#111;--muted:#86868b;--line:#e8e8ed;--blue:#0071e3;--shadow:0 16px 48px rgba(0,0,0,.07)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#fff,#f5f5f7 48%,#eee);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text)}button,input{font:inherit}.app{max-width:820px;margin:0 auto;padding:24px 16px 46px}.hero{text-align:center;padding:34px 0 18px}.logo{font-size:54px;font-weight:950;letter-spacing:-2px;margin:0}.sub{color:var(--muted);font-size:16px;line-height:1.5;margin:8px auto 0}.search{display:flex;gap:8px;background:#fff;border-radius:28px;padding:10px;box-shadow:var(--shadow);margin:24px auto 18px;max-width:680px}.search input{flex:1;border:1px solid var(--line);border-radius:20px;padding:15px 16px;font-size:17px;outline:0}.search button{border:0;background:#111;color:#fff;border-radius:20px;padding:0 22px;font-weight:900}.status{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 14px}.grid{display:grid;gap:14px}.card{background:var(--card);border:1px solid rgba(255,255,255,.85);box-shadow:var(--shadow);border-radius:28px;padding:20px}.head{display:flex;justify-content:space-between;gap:12px}.type{font-size:14px;color:var(--muted);font-weight:800}.title{font-size:25px;font-weight:950;margin-top:4px}.badge{border-radius:999px;background:#f2f2f7;color:#555;font-size:12px;font-weight:900;padding:6px 10px;height:max-content}.price{font-size:52px;font-weight:950;letter-spacing:-1.5px;margin:18px 0 8px}.price small{font-size:21px}.source{color:var(--muted);font-size:14px;line-height:1.45}.spec{display:inline-block;background:#f5f5f7;border:1px solid var(--line);border-radius:14px;padding:7px 10px;margin-top:10px;color:#555;font-size:13px;font-weight:800}.buy{margin-top:14px;border:0;border-radius:999px;background:var(--blue);color:#fff;padding:12px 18px;font-weight:900}.buy:disabled{background:#d1d1d6}.platforms{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.p{border:1px solid var(--line);border-radius:16px;text-align:center;padding:10px;background:#fff}.pn{font-size:12px;color:var(--muted)}.pp{font-weight:900;margin-top:4px}.pe{font-size:12px;color:#b0b0b5;margin-top:6px}.empty{background:#fff;border-radius:28px;padding:30px 18px;text-align:center;color:var(--muted);box-shadow:var(--shadow);line-height:1.6}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:10}@media(max-width:560px){.logo{font-size:44px}.platforms{grid-template-columns:repeat(2,1fr)}.price{font-size:44px}.search button{padding:0 18px}.app{padding-top:18px}}</style></head><body><div class="app"><section class="hero"><h1 class="logo">价比比</h1><p class="sub">输入商品，自动比较不同平台的真实价格。</p><form id="form" class="search"><input id="keyword" placeholder="输入商品名或粘贴商品链接"><button>比价</button></form></section><div id="status" class="status"></div><main id="summary" class="grid"></main></div><div id="toast" class="toast"></div><script>const API='https://jiabibi-api.onrender.com';const platforms=[['pdd','拼多多'],['tb','淘宝'],['douyin','抖音']];const groups=[['official','官方/自营最低价'],['channel','渠道店最低价'],['normal','普通店最低价']];const official=['官方旗舰店','品牌旗舰店','旗舰店','官方店','自营','官方'];const channel=['渠道','批发','厂家','工厂','源头','尾货','清仓','仓库','量贩','整箱批发','团购','商用'];const $=id=>document.getElementById(id);const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');const price=i=>Number(i?.coupon_price_yuan||i?.min_group_price_yuan||i?.price||999999);let lastQ='';function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}function text(i){return `${i.goods_name||''} ${i.goods_desc||''} ${i.brand_name||''} ${i.shop_name||''} ${(i.unified_tags||[]).join(' ')}`}function typeOf(i){const t=text(i);if(official.some(w=>t.includes(w)))return'official';if(channel.some(w=>t.includes(w)))return'channel';return'normal'}function parseSpec(i){const t=text(i).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml').replace(/公斤|千克/g,'kg').replace(/克/g,'g');const p=price(i);let m=t.match(/(\d+(?:\.\d+)?)\s*(kg|KG|斤|g|G)\s*\*?\s*(\d+)?/);if(m){let kg=Number(m[1]);if(m[2]==='斤')kg*=.5;if(['g','G'].includes(m[2]))kg/=1000;kg*=Number(m[3]||1);return {txt:`${yuan(kg)}kg｜约 ¥${yuan(p/kg)}/kg`,v:p/kg}}m=t.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)\s*\*?\s*(\d+)?/);if(m){let ml=Number(m[1]);if(['l','L','升'].includes(m[2]))ml*=1000;let c=Number(m[3]||1);return {txt:`${ml}ml × ${c}｜约 ¥${yuan(p/(ml*c/100))}/100ml`,v:p/(ml*c/100)}}m=t.match(/(\d+)\s*(抽|张)\s*\*?\s*(\d+)?/);if(m){let total=Number(m[1])*Number(m[3]||1);return {txt:`${total}抽/张｜约 ¥${yuan(p/(total/100))}/100抽`,v:p/(total/100)}}return {txt:'',v:p}}function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'')}function intent(q){const n=norm(q);let brand='';const known=['鲜朗','真零','百岁山','农夫山泉','怡宝','维达','蓝月亮','小米','苹果','华为','可口可乐'];brand=known.find(b=>n.includes(norm(b)))||'';let cat='';if(/猫粮|成猫|幼猫/.test(q))cat='cat';else if(/酸奶|发酵乳/.test(q))cat='yogurt';else if(/牛奶/.test(q))cat='milk';else if(/纸巾|抽纸|卷纸/.test(q))cat='paper';else if(/洗衣液|洗衣粉|洗衣凝珠/.test(q))cat='laundry';else if(/充电宝|移动电源|毫安|mah/i.test(q))cat='power';else if(/矿泉水|饮用水|百岁山|农夫山泉|怡宝/.test(q))cat='water';else if(/可乐|雪碧|芬达|汽水/.test(q))cat='cola';let weight=(q.match(/(\d+(?:\.\d+)?)\s*(kg|公斤|斤|g|克)/)||[]);return{brand,cat,weight:weight[1]?Number(weight[1])*(weight[2]==='斤'?.5:(/g|克/.test(weight[2])?.001:1)):0,adult:/成猫/.test(q),kitten:/幼猫/.test(q)}}function keep(i,q){const it=intent(q),t=text(i),nt=norm(t);if(it.brand&&!nt.includes(norm(it.brand)))return false;if(it.cat==='cat'){if(/狗粮|犬粮/.test(t))return false;if(!/猫粮|猫主粮|全价猫|成猫粮|幼猫粮|主粮|烘焙粮/.test(t))return false;if(it.adult&&/幼猫/.test(t)&&!/成猫|全阶段|全价|通用/.test(t))return false}if(it.cat==='yogurt'&&!/酸奶|发酵乳|酸乳/.test(t))return false;if(it.cat==='milk'&&(!/牛奶|纯牛奶|鲜牛奶|牛乳/.test(t)||/酸奶|发酵乳/.test(t)))return false;if(it.cat==='paper'&&!/纸巾|抽纸|卷纸|卫生纸|面巾纸/.test(t))return false;if(it.cat==='laundry'&&!/洗衣液|洗衣粉|洗衣凝珠/.test(t))return false;if(it.cat==='water'&&!/矿泉水|饮用水|天然水|纯净水|矿物质水|百岁山|农夫山泉|怡宝/.test(t))return false;if(it.cat==='cola'&&!/可乐|雪碧|芬达|汽水|碳酸/.test(t))return false;if(it.weight){const sp=parseSpec(i).txt;const m=sp.match(/([\d.]+)kg/);if(!m)return false;const kg=Number(m[1]);if(Math.abs(kg-it.weight)>Math.max(.15,it.weight*.18))return false}return true}function best(list,q,type,p){return list.filter(i=>i.platform===p&&typeOf(i)===type&&keep(i,q)).sort((a,b)=>parseSpec(a).v-parseSpec(b).v||price(a)-price(b))[0]}function bestAcross(list,q,type){return platforms.map(([p])=>best(list,q,type,p)).filter(Boolean).sort((a,b)=>parseSpec(a).v-parseSpec(b).v||price(a)-price(b))[0]}function card(type,item,list,q){let pf=item?(platforms.find(x=>x[0]===item.platform)?.[1]||item.platform):'暂无';let sp=item?parseSpec(item):{txt:'',v:0};return `<section class="card"><div class="head"><div><div class="type">${type==='official'?'官方旗舰、自营、品牌官方店里的最低价':type==='channel'?'批发、源头、清仓、量贩渠道的最低价':'普通店最低价'}</div><div class="title">${groups.find(x=>x[0]===type)[1]}</div></div><div class="badge">${pf}</div></div>${item?`<div class="price"><small>¥</small>${yuan(price(item))}</div><div class="source">${pf} · ${item.shop_name||item.brand_name||''}<br>${item.goods_name||''}</div>${sp.txt?`<div class="spec">${sp.txt}</div>`:''}<br><button class="buy" data-key="${item._key}">去购买</button>`:`<div class="price"><small>¥</small>--</div><div class="source">暂未返回可靠商品。</div><button class="buy" disabled>去购买</button>`}<div class="platforms">${platforms.map(([p,n])=>{let x=best(list,q,type,p);return `<div class="p"><div class="pn">${n}</div>${x?`<div class="pp">¥${yuan(price(x))}</div>`:`<div class="pe">暂无</div>`}</div>`}).join('')}</div></section>`}function render(data,q){const list=(data.goods_list||[]).filter(i=>['pdd','tb','douyin'].includes(i.platform)&&keep(i,q));let map={};list.forEach((i,k)=>{i._key='g'+k;map[i._key]=i});window.__goods=map;$('summary').innerHTML=list.length?groups.map(([g])=>card(g,bestAcross(list,q,g),list,q)).join(''):'<div class="empty">暂无可靠匹配。为了避免错品，已过滤掉不满足品牌、品类或规格的结果。</div>';document.querySelectorAll('.buy[data-key]').forEach(b=>b.onclick=()=>buy(window.__goods[b.dataset.key]));}async function search(v){let q=(v||$('keyword').value||'').trim();if(!q)return;$('keyword').value=q;lastQ=q;$('status').textContent='正在比价...';$('summary').innerHTML='<div class="empty">加载中...</div>';try{let r=await fetch(`${API}/api/search?platform=all&page_size=50&keyword=${encodeURIComponent(q)}`);let d=await r.json();render(d,q);$('status').textContent='已按真实返回和规格规则汇总。'}catch(e){$('summary').innerHTML='<div class="empty">搜索失败：'+e.message+'</div>'}}function tbUrl(i){return i.material_url||i.url||i.item_url||`https://s.m.taobao.com/h5?q=${encodeURIComponent(i.goods_name||lastQ||'商品')}`}async function buy(i){if(!i)return;let p=i.platform,url=i.material_url||i.url||i.item_url||i.product_url||'';try{if(p==='tb'){location.href=tbUrl(i);return}if(p==='douyin'){if(url){let r=await fetch(API+'/api/douyin/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_url:url,product_ext:i.product_ext||''})});let d=await r.json();url=d.url||d.dy_deeplink||d.dy_zlink||d.dy_sharelink||url}location.href=url||`https://www.douyin.com/search/${encodeURIComponent(i.goods_name||lastQ)}`;return}if(p==='pdd'){let r=await fetch(API+'/api/pdd/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goods_sign:i.goods_sign,goods_id:i.goods_id})});let d=await r.json();url=d.mobile_short_url||d.short_url||d.mobile_url||d.url||i.material_url||url}if(url)location.href=url;else toast('暂时没有购买链接')}catch(e){toast('跳转失败')}}$('form').onsubmit=e=>{e.preventDefault();search()};search('真零 酸奶');</script></body></html>
