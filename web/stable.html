<!doctype html>
<html lang="zh-CN">
<head>

<title>价比比 Stable</title>
<style>
:root{--card:rgba(255,255,255,.9);--text:#1d1d1f;--muted:#86868b;--line:#e8e8ed;--blue:#0071e3;--shadow:0 18px 60px rgba(0,0,0,.08)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top,#fff 0,#f5f5f7 45%,#eee 100%);color:var(--text)}button,input{font:inherit}.app{max-width:980px;margin:0 auto;padding:20px 14px 42px}.hero{text-align:center;padding:34px 4px 18px}.logo{font-size:54px;font-weight:900;letter-spacing:-1.8px;margin:0}.sub{margin:9px auto 0;color:var(--muted);font-size:16px;line-height:1.55;max-width:680px}.search-card{margin:22px auto 0;background:var(--card);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.75);box-shadow:var(--shadow);border-radius:28px;padding:10px;display:flex;gap:8px;max-width:720px}.search-card input{flex:1;border:0;background:#fff;border-radius:20px;padding:15px 16px;font-size:16px;outline:0;box-shadow:inset 0 0 0 1px var(--line)}.search-card button{border:0;background:#111;color:#fff;border-radius:20px;padding:0 22px;font-weight:800;cursor:pointer}.chips{display:flex;gap:8px;overflow:auto;padding:14px 2px 0;justify-content:center}.chip{border:0;background:#fff;border-radius:999px;padding:8px 12px;color:#555;white-space:nowrap;box-shadow:0 3px 14px rgba(0,0,0,.05);cursor:pointer}.status{text-align:center;color:var(--muted);font-size:13px;padding:12px 0 14px}.summary-grid{display:grid;gap:14px}.deal-card{background:var(--card);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);border-radius:28px;padding:20px;backdrop-filter:blur(18px);min-height:166px}.deal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.deal-type{font-size:14px;color:var(--muted);font-weight:700}.deal-title{font-size:25px;font-weight:900;letter-spacing:-.5px;margin-top:3px}.badge{font-size:12px;font-weight:800;border-radius:999px;padding:6px 9px;background:#f2f2f7;color:#555;white-space:nowrap}.badge.official{background:#fff1f0;color:#cf1322}.badge.channel{background:#eff6ff;color:#1d4ed8}.badge.normal{background:#f0fdf4;color:#15803d}.best{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:18px}.price{font-size:48px;font-weight:900;letter-spacing:-1.2px;line-height:1;color:#111}.price small{font-size:20px}.source{font-size:13px;color:var(--muted);line-height:1.45;margin-top:8px;max-width:560px}.spec{display:inline-block;margin-top:8px;background:#f5f5f7;border:1px solid var(--line);border-radius:12px;padding:6px 8px;color:#555;font-size:12px;font-weight:700}.hint{margin-top:8px;color:#8a8a8f;font-size:12px;line-height:1.45;max-width:560px}.buy{border:0;border-radius:999px;background:var(--blue);color:#fff;padding:11px 16px;font-weight:800;cursor:pointer;white-space:nowrap}.buy:disabled{background:#d1d1d6}.platforms{margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.p{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center;min-height:74px}.p-name{font-size:12px;color:var(--muted)}.p-price{font-size:17px;font-weight:900;margin-top:4px}.p-unit{font-size:11px;color:#777;margin-top:2px}.p-empty{font-size:12px;color:#b0b0b5;margin-top:6px;line-height:1.25}.note{margin:16px auto 0;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.85);border-radius:22px;padding:14px 16px;color:#6e6e73;font-size:13px;line-height:1.55}.loading{height:166px;border-radius:28px;background:linear-gradient(90deg,#eee,#fafafa,#eee);background-size:200% 100%;animation:shine 1.2s infinite}@keyframes shine{to{background-position:-200% 0}}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:10;max-width:86%;text-align:center}.empty{background:#fff;border-radius:28px;padding:34px 18px;text-align:center;color:var(--muted);box-shadow:var(--shadow);line-height:1.6}@media(max-width:520px){.logo{font-size:44px}.search-card{border-radius:24px}.search-card button{padding:0 16px}.platforms{grid-template-columns:repeat(2,1fr)}.best{align-items:flex-start}.price{font-size:40px}.deal-title{font-size:23px}}
</style>
</head>
<body>
<div class="app">
<section class="hero"><h1 class="logo">价比比</h1><p class="sub">稳定测试版：只展示官方最低、渠道最低、普通店最低；规格商品统一按单位价比较，错品宁可不展示。</p><form id="form" class="search-card"><input id="keyword" value="酸奶" placeholder="搜索商品，或粘贴商品链接"><button>比价</button></form><div id="chips" class="chips"></div></section>
<div id="status" class="status">准备好了。</div><main id="summary" class="summary-grid"></main>
<section class="note">规则：酸奶/牛奶分离；饮料按 ¥/100ml；酸奶/牛奶/洗衣液按 ¥/kg 或 ¥/L；纸巾按 ¥/100抽；充电宝按容量/功率；手机壳按机型；拼多多 ps 链接优先后端解析/抓取。</section>
</div><div id="toast" class="toast"></div>
<script>
const API_BASE='https://jiabibi-api.onrender.com';
const platforms=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];
const hotWords=['酸奶','真零 酸奶','牛奶','百岁山','农夫山泉','无糖可口可乐','维达纸巾','蓝月亮洗衣液','小米充电宝 20000毫安','苹果15手机壳'];
const groups=['official','channel','normal'];
const groupMeta={official:{title:'官方/自营最低价',desc:'官方旗舰、自营、品牌官方店里的最低价',hint:'当前接口未返回可识别为官方旗舰/自营的相关商品。'},channel:{title:'渠道店最低价',desc:'批发、源头、清仓、量贩、整箱渠道的最低价',hint:'当前接口未返回可识别为渠道/批发/源头/清仓的相关商品。'},normal:{title:'普通店最低价',desc:'非官方、非明显渠道的普通店最低价',hint:'当前接口未返回普通店相关商品。'}};
const $=id=>document.getElementById(id), yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,''), priceOf=i=>Number(i?.coupon_price_yuan||i?.min_group_price_yuan||999999);
let effectiveKeyword='酸奶',providerState=[];
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1800)}
function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'')}
function text(i){return `${i.goods_name||''} ${i.brand_name||''} ${i.shop_name||''} ${(i.unified_tags||[]).join(' ')}`}
function title(i){return String(i.goods_name||'')}
function has(t,arr){const n=norm(t);return arr.some(x=>n.includes(norm(x)))}
const brandDict={xiaomi:['小米','xiaomi','redmi','米家'],anker:['安克','anker'],vinda:['维达','vinda'],blue:['蓝月亮'],apple:['苹果','apple','iphone'],huawei:['华为','huawei'],coke:['可口可乐','coca-cola','cocacola','coca','cola'],sprite:['雪碧','sprite'],fanta:['芬达','fanta'],pepsi:['百事','pepsi'],ganten:['百岁山','ganten'],nongfu:['农夫山泉'],cestbon:['怡宝'],zhenling:['真零']};
const catDict={yogurt:['酸奶','低温酸奶','常温酸奶','风味发酵乳','发酵乳','乳酸菌','酸乳'],milk:['牛奶','纯牛奶','鲜牛奶','牛乳','蛋白牛乳'],beverage:['饮料','汽水','碳酸','可乐','雪碧','芬达','果汁','茶饮料','矿泉水','纯净水','能量饮料','矿泉','矿物质水','天然水','饮用水','水','ml','毫升','瓶','罐','整箱'],paper:['纸巾','抽纸','卷纸','面巾纸','抽','张','包','提'],laundry:['洗衣液','洗衣凝珠','洗衣粉','kg','公斤','斤','g','克','l','升'],power:['充电宝','移动电源','mah','毫安','快充'],case:['手机壳','保护壳','硅胶壳','壳']};
const beverageBrandKeys=['coke','sprite','fanta','pepsi','ganten','nongfu','cestbon'];
const attrDict={noSugar:['无糖','零糖','0糖','零度','zero','零卡','0卡','无蔗糖','0蔗糖'],lowSugar:['低糖','少糖'],lactoseFree:['0乳糖','无乳糖','零乳糖'],caffeineFree:['无咖啡因','脱咖啡因']};
const hardExcludes=['刻字','激光','礼物','礼盒','摆件','挂件','钥匙扣','贴纸','海报','模型','手办','空瓶','收藏','周边','定制','抱枕','衣服','杯子','水杯','开瓶器','配件','适用','兼容'];
const officialWords=['官方旗舰店','品牌旗舰店','旗舰店','官方店','官方商城','官方旗舰','京东自营','自营'];
const channelWords=['渠道','批发','厂家','工厂','源头','代购','尾货','清仓','仓库','仓储','量贩','整箱批发','批发价','团购','特卖','底价','大包装','商用'];
const caseModels=['iphone15promax','iphone15pro','iphone15plus','iphone15','iphone14promax','iphone14pro','iphone14plus','iphone14','小米14ultra','小米14pro','小米14','华为mate60pro','华为mate60','华为pura70','华为p70'];
function detect(q){const nq=norm(q);let brandKeys=[];for(const[k,a]of Object.entries(brandDict))if(a.some(x=>nq.includes(norm(x))))brandKeys.push(k);let catKeys=[];for(const[k,a]of Object.entries(catDict))if(a.some(x=>nq.includes(norm(x))))catKeys.push(k);if(brandKeys.some(k=>beverageBrandKeys.includes(k))&&!catKeys.includes('beverage'))catKeys.push('beverage');if(catKeys.includes('yogurt'))catKeys=catKeys.filter(k=>k!=='milk');if(catKeys.includes('milk'))catKeys=catKeys.filter(k=>k!=='yogurt');const attrs=[];for(const[k,a]of Object.entries(attrDict))if(a.some(x=>nq.includes(norm(x))))attrs.push(k);return{brandKeys,catKeys,attrs,model:caseModels.find(m=>nq.includes(norm(m)))||'',cap:(nq.match(/(\d{4,6})(?:mah|毫安)/)||[])[1]||'',watt:(nq.match(/(\d{2,3})w/)||[])[1]||'',wantsYogurt:catKeys.includes('yogurt'),wantsMilk:catKeys.includes('milk'),wantsBeverage:catKeys.includes('beverage'),wantsPaper:catKeys.includes('paper'),wantsLaundry:catKeys.includes('laundry'),wantsPower:catKeys.includes('power'),wantsCase:catKeys.includes('case')}}
function brandOk(i,it){if(!it.brandKeys.length)return true;return it.brandKeys.some(k=>has(title(i),brandDict[k])&&has(text(i),brandDict[k]))}
function categoryOk(i,it){if(!it.catKeys.length)return true;const tx=text(i);if(it.wantsYogurt)return has(tx,catDict.yogurt);if(it.wantsMilk)return has(tx,catDict.milk)&&!has(tx,catDict.yogurt);return it.catKeys.some(k=>has(tx,catDict[k]))}
function attrOk(i,it){if(!it.attrs.length)return true;return it.attrs.every(k=>has(text(i),attrDict[k]))}
function unitMl(v,u){u=String(u||'').toLowerCase();return(u==='l'||u==='升')?v*1000:v}function unitKg(v,u){u=String(u||'').toLowerCase();if(u==='kg'||u==='公斤')return v;if(u==='斤')return v*.5;return v/1000}
function parseLiquidWeight(i,kind){const tx=text(i).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml');const price=priceOf(i);let ml=0,kg=0,l=0,count=1,container='件',estimated=false;let m=tx.match(/(\d+(?:\.\d+)?)\s*(kg|KG|公斤|斤|g|G|克|ml|ML|mL|l|L|升)\s*[*]\s*(\d+)\s*(桶|瓶|盒|杯|袋|罐|听|件)?/);if(m){count=+m[3];container=m[4]||container;if(/ml|ML|mL|l|L|升/.test(m[2])){ml=unitMl(+m[1],m[2]);l=ml/1000*count}else kg=unitKg(+m[1],m[2])*count}if(!kg&&!l){m=tx.match(/(\d+(?:\.\d+)?)\s*(kg|KG|公斤|斤|g|G|克|ml|ML|mL|l|L|升)/);if(m){if(/ml|ML|mL|l|L|升/.test(m[2])){ml=unitMl(+m[1],m[2]);l=ml/1000}else kg=unitKg(+m[1],m[2])}}if(count===1){m=tx.match(/(\d+)\s*(桶|瓶|盒|杯|袋|罐|听)/);if(m){count=+m[1];container=m[2]}}if(kind==='beverage'&&ml&&count===1&&!/(\d+)\s*(瓶|罐|听)/.test(tx)){estimated=true;container=/罐|听/.test(tx)?'罐':'瓶'}const totalMl=ml&&count?ml*count:0;return{kind,ml,kg,l,count,container,estimated,totalMl,unit:kind==='beverage'?(totalMl?price/(totalMl/100):null):(kg?price/kg:(l?price/l:null)),piece:count?price/count:null}}
function parsePaper(i){const tx=text(i).replace(/[×ＸxX]/g,'*');const price=priceOf(i);let draws=0,packs=0,layers=0;let m=tx.match(/(\d+)\s*(抽|张)\s*[*]\s*(\d+)\s*(包|提|箱|组)?/);if(m){draws=+m[1];packs=+m[3]}if(!packs){m=tx.match(/(\d+)\s*(包|提|箱).{0,8}?(\d+)\s*(抽|张)/);if(m){packs=+m[1];draws=+m[3]}}if(!draws){m=tx.match(/(\d+)\s*(抽|张)/);if(m)draws=+m[1]}if(!packs){m=tx.match(/(\d+)\s*(包|提|箱)/);if(m)packs=+m[1]}m=tx.match(/(\d+)\s*层/);if(m)layers=+m[1];const total=draws&&packs?draws*packs:0;return{kind:'paper',draws,packs,layers,total,unit:total?price/(total/100):null,piece:packs?price/packs:null}}
function parsePower(i){const tx=norm(text(i));const price=priceOf(i);const cap=Number((tx.match(/(\d{4,6})(?:mah|毫安)/)||[])[1]||0);const watt=Number((tx.match(/(\d{2,3})w/)||[])[1]||0);return{kind:'power',cap,watt,unit:cap?price/(cap/10000):null,piece:null}}
function parseCase(i){const tx=norm(text(i));const model=caseModels.find(m=>tx.includes(norm(m)))||'';return{kind:'case',model,unit:priceOf(i),piece:null}}
function parseSpec(i,q){const it=detect(q);if(it.wantsBeverage)return parseLiquidWeight(i,'beverage');if(it.wantsYogurt)return parseLiquidWeight(i,'yogurt');if(it.wantsMilk)return parseLiquidWeight(i,'milk');if(it.wantsLaundry)return parseLiquidWeight(i,'laundry');if(it.wantsPaper)return parsePaper(i);if(it.wantsPower)return parsePower(i);if(it.wantsCase)return parseCase(i);return parseLiquidWeight(i,'generic')}
function specText(i,q){const s=parseSpec(i,q);const p=[];if(s.kind==='beverage'){if(s.ml&&s.count)p.push(`${s.ml}ml × ${s.count}${s.container}${s.estimated?'（按单瓶估算）':''}`);if(s.piece)p.push(`约 ¥${yuan(s.piece)}/${s.container}`);if(s.unit)p.push(`约 ¥${yuan(s.unit)}/100ml${s.estimated?'（估算）':''}`)}else if(['yogurt','milk','laundry','generic'].includes(s.kind)){if(s.kg)p.push(`${yuan(s.kg)}kg`);if(s.l)p.push(`${yuan(s.l)}L`);if(s.count>1)p.push(`${s.count}${s.container}`);if(s.unit)p.push(`约 ¥${yuan(s.unit)}/${s.kg?'kg':'L'}`);if(s.piece&&s.count>1)p.push(`约 ¥${yuan(s.piece)}/${s.container}`)}else if(s.kind==='paper'){if(s.draws&&s.packs)p.push(`${s.draws}抽 × ${s.packs}包`);if(s.layers)p.push(`${s.layers}层`);if(s.unit)p.push(`约 ¥${yuan(s.unit)}/100抽`);if(s.piece)p.push(`约 ¥${yuan(s.piece)}/包`)}else if(s.kind==='power'){if(s.cap)p.push(`${s.cap}mAh`);if(s.watt)p.push(`${s.watt}W`);if(s.unit)p.push(`约 ¥${yuan(s.unit)}/万mAh`)}else if(s.kind==='case'&&s.model)p.push(`适配 ${s.model}`);return p.join('｜')}
function strict(i,q){const it=detect(q),tx=text(i),n=norm(tx);if(String(i.source||'').includes('scrape'))return true;if(hardExcludes.some(x=>n.includes(norm(x))))return false;if(it.wantsBeverage&&['电池','口罩','防晒','遮阳','台灯','灯具','手机壳','保护壳'].some(x=>n.includes(norm(x))))return false;if(!brandOk(i,it)||!categoryOk(i,it)||!attrOk(i,it))return false;const s=parseSpec(i,q);if((it.wantsBeverage||it.wantsYogurt||it.wantsMilk||it.wantsLaundry)&&!s.unit)return false;if(it.wantsPaper&&!s.unit)return false;if(it.wantsPower){if(it.cap&&s.cap&&Math.abs(s.cap-Number(it.cap))>1000)return false;if(it.watt&&s.watt&&s.watt<Number(it.watt))return false}if(it.wantsCase&&it.model&&s.model!==it.model)return false;return true}
function score(i,q){const it=detect(q),ti=title(i),tx=text(i);let s=0;for(const k of it.brandKeys){if(has(ti,brandDict[k]))s+=600;if(has(tx,brandDict[k]))s+=150}for(const k of it.catKeys){if(has(ti,catDict[k]))s+=240;else if(has(tx,catDict[k]))s+=80}for(const k of it.attrs){if(has(ti,attrDict[k]))s+=500;else if(has(tx,attrDict[k]))s+=200}if(norm(ti).includes(norm(q)))s+=800;if(String(i.source||'').includes('exact_input')||String(i.source||'').includes('scrape'))s+=1000;return s}
function value(i,q){const s=parseSpec(i,q);return s.unit||s.piece||priceOf(i)}function channelType(i){const tx=text(i);if(has(tx,officialWords))return'official';if(has(tx,channelWords))return'channel';return'normal'}function best(list,q,type,p){return list.filter(x=>x.platform===p&&channelType(x)===type&&strict(x,q)).sort((a,b)=>value(a,q)-value(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}function bestAcross(list,q,type){return platforms.map(([p])=>best(list,q,type,p)).filter(Boolean).sort((a,b)=>value(a,q)-value(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function showLoading(){const s=$('summary');s.innerHTML='';for(let i=0;i<3;i++){const d=document.createElement('div');d.className='loading';s.appendChild(d)}}function emptyLabel(p){const st=providerState.find(x=>x.platform===p);return st&&st.source==='provider_placeholder'?'待接入':'未返回/未识别'}function mini(list,q,type){return`<div class="platforms">${platforms.map(([p,n])=>{const it=best(list,q,type,p),sp=it?specText(it,q):'';return`<div class="p"><div class="p-name">${n}</div>${it?`<div class="p-price">¥${yuan(priceOf(it))}</div><div class="p-unit">${sp.split('｜').slice(-1)[0]||''}</div>`:`<div class="p-empty">${emptyLabel(p)}</div>`}</div>`}).join('')}</div>`}
function card(type,it,list,q){const meta=groupMeta[type],pf=it?platforms.find(x=>x[0]===it.platform)?.[1]:'';const sp=it?specText(it,q):'';return`<section class="deal-card"><div class="deal-head"><div><div class="deal-type">${meta.desc}</div><div class="deal-title">${meta.title}</div></div><div class="badge ${type}">${pf||'暂无'}</div></div><div class="best"><div>${it?`<div class="price"><small>¥</small>${yuan(priceOf(it))}</div><div class="source">${pf} · ${it.shop_name||it.brand_name||''}<br>${it.goods_name||''}</div>${sp?`<div class="spec">${sp}</div>`:''}`:`<div class="price"><small>¥</small>--</div><div class="source">${meta.hint}</div><div class="hint">这通常是接口覆盖或店型不可识别，不代表平台上绝对没有。</div>`}</div><button class="buy" ${it?`data-key="${it._key}"`:''} ${it?'':'disabled'}>去购买</button></div>${mini(list,q,type)}</section>`}
function render(list,q=effectiveKeyword,providers=[]){providerState=providers||[];const filtered=list.filter(x=>strict(x,q));const keyed={};filtered.forEach((x,i)=>{x._key='k'+i;keyed[x._key]=x});window.__goods=keyed;const s=$('summary');s.innerHTML='';if(!filtered.length){s.innerHTML='<div class="empty">暂无可靠匹配。为了避免错品，已过滤掉不满足品牌、品类、强属性或规格的结果。</div>';return}for(const type of groups)s.insertAdjacentHTML('beforeend',card(type,bestAcross(filtered,q,type),filtered,q));document.querySelectorAll('.buy[data-key]').forEach(b=>b.onclick=e=>buy(window.__goods[e.target.dataset.key]))}
async function search(v){const raw=(v||$('keyword').value||'').trim()||'酸奶';$('keyword').value=raw;$('status').textContent='正在比价...';showLoading();try{const r=await fetch(`${API_BASE}/api/search?keyword=${encodeURIComponent(raw)}&platform=all&page_size=50`);const d=await r.json();if(!r.ok||d.error)throw new Error(d.message||d.error||'搜索失败');effectiveKeyword=d.keyword||raw;render(d.goods_list||[],effectiveKeyword,d.providers||[]);$('status').textContent=`“${effectiveKeyword}” 已按稳定版规则汇总。`}catch(e){$('summary').innerHTML='<div class="empty">搜索失败：'+e.message+'</div>';$('status').textContent='搜索失败'}}
async function buy(it){if(!it)return;try{toast('正在生成购买链接...');let endpoint,body;if(it.platform==='pdd'){endpoint='/api/pdd/link';body={goods_sign:it.goods_sign}}else if(it.platform==='jd'){endpoint='/api/jd/link';body={sku_id:it.sku_id,material_url:it.material_url,coupon_url:it.coupon_url}}else{toast('该平台真实转链未接入');return}if(it.platform==='pdd'&&!it.goods_sign&&it.material_url){location.href=it.material_url;return}const r=await fetch(`${API_BASE}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok||d.error_response)throw new Error(d.error_response?.sub_msg||d.message||'生成失败');const link=d.mobile_short_url||d.short_url||d.mobile_url||d.click_url||d.url||d.schema_url;if(link)location.href=link;else toast('没有返回链接')}catch(e){toast('生成失败：'+e.message)}}
$('form').onsubmit=e=>{e.preventDefault();search()};hotWords.forEach(w=>{const b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=()=>search(w);$('chips').appendChild(b)});search('酸奶');
</script>
</body>
