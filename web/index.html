<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>价比比</title>
  <style>
    :root{--bg:#f5f5f7;--card:rgba(255,255,255,.88);--text:#1d1d1f;--muted:#86868b;--line:#e8e8ed;--blue:#0071e3;--shadow:0 18px 60px rgba(0,0,0,.08)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top,#fff 0,#f5f5f7 45%,#eee 100%);color:var(--text)}button,input{font:inherit}.app{max-width:980px;margin:0 auto;padding:18px 14px 40px}.hero{text-align:center;padding:34px 4px 18px}.logo{font-size:42px;font-weight:900;letter-spacing:-1.6px;margin:0}.sub{margin:8px auto 0;color:var(--muted);font-size:15px;line-height:1.5;max-width:560px}.search-card{margin:22px auto 0;background:var(--card);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.75);box-shadow:var(--shadow);border-radius:28px;padding:10px;display:flex;gap:8px;max-width:720px}.search-card input{flex:1;border:0;background:#fff;border-radius:20px;padding:15px 16px;font-size:16px;outline:0;box-shadow:inset 0 0 0 1px var(--line)}.search-card button{border:0;background:#111;color:#fff;border-radius:20px;padding:0 22px;font-weight:800;cursor:pointer}.chips{display:flex;gap:8px;overflow:auto;padding:14px 2px 0;justify-content:center}.chip{border:0;background:#fff;border-radius:999px;padding:8px 12px;color:#555;white-space:nowrap;box-shadow:0 3px 14px rgba(0,0,0,.05);cursor:pointer}.status{text-align:center;color:var(--muted);font-size:13px;padding:12px 0 14px}.summary-grid{display:grid;gap:14px}.deal-card{background:var(--card);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);border-radius:28px;padding:18px;backdrop-filter:blur(18px);min-height:166px}.deal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.deal-type{font-size:14px;color:var(--muted);font-weight:700}.deal-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-top:3px}.badge{font-size:12px;font-weight:800;border-radius:999px;padding:6px 9px;background:#f2f2f7;color:#555;white-space:nowrap}.badge.official{background:#fff1f0;color:#cf1322}.badge.channel{background:#eff6ff;color:#1d4ed8}.badge.normal{background:#f0fdf4;color:#15803d}.best{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:18px}.price{font-size:42px;font-weight:900;letter-spacing:-1.2px;line-height:1;color:#111}.price small{font-size:19px}.source{font-size:13px;color:var(--muted);line-height:1.45;margin-top:8px;max-width:520px}.spec{display:inline-block;margin-top:8px;background:#f5f5f7;border:1px solid var(--line);border-radius:12px;padding:6px 8px;color:#555;font-size:12px;font-weight:700}.buy{border:0;border-radius:999px;background:var(--blue);color:#fff;padding:11px 16px;font-weight:800;cursor:pointer;white-space:nowrap}.buy:disabled{background:#d1d1d6}.platforms{margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.p{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center;min-height:72px}.p-name{font-size:12px;color:var(--muted)}.p-price{font-size:17px;font-weight:900;margin-top:4px}.p-unit{font-size:11px;color:#777;margin-top:2px}.p-empty{font-size:12px;color:#b0b0b5;margin-top:6px}.note{margin:16px auto 0;background:rgba(255,255,255,.64);border:1px solid rgba(255,255,255,.8);border-radius:22px;padding:14px 16px;color:#6e6e73;font-size:13px;line-height:1.55}.loading{height:166px;border-radius:28px;background:linear-gradient(90deg,#eee,#fafafa,#eee);background-size:200% 100%;animation:shine 1.2s infinite}@keyframes shine{to{background-position:-200% 0}}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:10;max-width:86%;text-align:center}.empty{background:#fff;border-radius:28px;padding:34px 18px;text-align:center;color:var(--muted);box-shadow:var(--shadow);line-height:1.6}@media(min-width:760px){.deal-card{padding:22px}.logo{font-size:58px}.sub{font-size:17px}.price{font-size:54px}.app{padding-top:26px}}@media(max-width:520px){.search-card{border-radius:24px}.search-card button{padding:0 16px}.platforms{grid-template-columns:repeat(2,1fr)}.best{align-items:flex-start}.price{font-size:38px}.deal-title{font-size:22px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1 class="logo">价比比</h1>
      <p class="sub">输入商品名或粘贴商品链接，只看三个价格：官方最低、渠道最低、普通店最低。</p>
      <form id="form" class="search-card"><input id="keyword" value="无糖可口可乐" placeholder="搜索商品，或粘贴商品链接"><button>比价</button></form>
      <div id="chips" class="chips"></div>
    </section>
    <div id="status" class="status">准备好了。</div>
    <main id="summary" class="summary-grid"></main>
    <section class="note">算法升级为意图匹配：品牌、品类、强属性同时约束；无糖/零糖/zero 必须命中；饮料按每100ml比较，规格解析不到会降权。</section>
  </div>
  <div id="toast" class="toast"></div>
<script>
const API_BASE='https://jiabibi-api.onrender.com';
const hotWords=['无糖可口可乐','可口可乐饮料','小米充电宝','安克充电宝','维达纸巾','蓝月亮洗衣液'];
const platforms=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];
const groups=[['official','官方/自营最低价','官方旗舰、自营、品牌官方店里的最低价'],['channel','渠道店最低价','渠道、批发、源头、清仓等渠道店最低价'],['normal','普通店最低价','非官方、非明显渠道的普通店最低价']];
const $=id=>document.getElementById(id);
const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');
const priceOf=item=>Number(item?.coupon_price_yuan||item?.min_group_price_yuan||999999);
let effectiveKeyword='无糖可口可乐';
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1800)}
function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'')}
const brandDict={xiaomi:['小米','xiaomi','redmi','米家'],anker:['安克','anker'],vinda:['维达','vinda'],blue:['蓝月亮'],apple:['苹果','apple','iphone'],huawei:['华为','huawei'],coke:['可口可乐','coca-cola','cocacola','coca','cola'],sprite:['雪碧','sprite'],fanta:['芬达','fanta'],pepsi:['百事','pepsi']};
const beverageBrandKeys=['coke','sprite','fanta','pepsi'];
const catDict={power:['充电宝','移动电源','mah','毫安'],paper:['纸巾','抽纸','卷纸'],laundry:['洗衣液','洗衣凝珠'],case:['手机壳','保护壳'],earphone:['耳机','蓝牙耳机'],beverage:['饮料','汽水','碳酸','可乐','雪碧','芬达','果汁','茶饮料','矿泉水','纯净水','能量饮料','ml','毫升','瓶','罐','整箱']};
const attrDict={noSugar:['无糖','零糖','0糖','零度','zero','zerodrink','零卡','0卡','无蔗糖'],lowSugar:['低糖','少糖'],caffeineFree:['无咖啡因','脱咖啡因']};
const hardExcludes=['刻字','激光','礼物','礼盒','摆件','挂件','钥匙扣','贴纸','海报','模型','手办','空瓶','收藏','周边','定制','抱枕','衣服','杯子','水杯','开瓶器','配件','适用','兼容'];
const beverageExcludes=['电池','口罩','防晒','遮阳','台灯','灯具','户外露营灯','雨伞','手机壳','保护壳'];
function hitsAny(text,arr){const t=norm(text);return arr.some(x=>t.includes(norm(x)))}
function itemTitle(item){return String(item.goods_name||'')}
function itemText(item){return `${item.goods_name||''} ${item.brand_name||''} ${item.shop_name||''} ${(item.unified_tags||[]).join(' ')}`}
function detectIntent(q){const nq=norm(q);const brandKeys=[];for(const [key,arr] of Object.entries(brandDict)){if(arr.some(x=>nq.includes(norm(x))))brandKeys.push(key)}const catKeys=[];for(const [key,arr] of Object.entries(catDict)){if(arr.some(x=>nq.includes(norm(x))))catKeys.push(key)}if(brandKeys.some(k=>beverageBrandKeys.includes(k))&&!catKeys.includes('beverage'))catKeys.push('beverage');const attrs=[];for(const [key,arr] of Object.entries(attrDict)){if(arr.some(x=>nq.includes(norm(x))))attrs.push(key)}return {brandKeys,catKeys,attrs,wantsBeverage:catKeys.includes('beverage')}}
function titleBrandOk(item,intent){if(!intent.brandKeys.length)return true;const title=itemTitle(item);return intent.brandKeys.some(k=>hitsAny(title,brandDict[k]));}
function textBrandOk(item,intent){if(!intent.brandKeys.length)return true;const text=itemText(item);return intent.brandKeys.some(k=>hitsAny(text,brandDict[k]));}
function categoryOk(item,intent){if(!intent.catKeys.length)return true;const text=itemText(item);return intent.catKeys.some(k=>hitsAny(text,catDict[k]));}
function attrOk(item,intent){if(!intent.attrs.length)return true;const text=itemText(item);return intent.attrs.every(k=>hitsAny(text,attrDict[k]));}
function unitToMl(v,unit){unit=String(unit||'').toLowerCase();return (unit==='l'||unit==='升')?v*1000:v;}
function parsePack(item){const text=itemText(item).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml').replace(/ＭＬ/ig,'ml');const price=priceOf(item);let ml=0,count=0,container='件';
  const setPack=(vol,unit,cnt,cont)=>{ml=unitToMl(Number(vol),unit);count=Number(cnt);container=cont||container||'件'};
  let m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)\s*[*]\s*(\d+)\s*(瓶|罐|听|支|盒|包)?/);
  if(m)setPack(m[1],m[2],m[3],m[4]);
  if(!count){m=text.match(/(\d+)\s*(瓶|罐|听)\s*[*]?\s*(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)/);if(m)setPack(m[3],m[4],m[1],m[2]);}
  if(!count){m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升).{0,12}?(\d+)\s*(瓶|罐|听)/);if(m)setPack(m[1],m[2],m[3],m[4]);}
  if(!count){m=text.match(/(\d+)\s*(瓶|罐|听).{0,12}?(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)/);if(m)setPack(m[3],m[4],m[1],m[2]);}
  if(!count){const c=text.match(/(\d+)\s*(瓶|罐|听|支|包|盒|片|抽)/);if(c){count=Number(c[1]);container=c[2];}}
  if(!ml){const mm=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)/);if(mm)ml=unitToMl(Number(mm[1]),mm[2]);}
  const totalMl=ml&&count?ml*count:0;return {ml,count,container,totalMl,unitPerPiece:count?price/count:null,unitPer100ml:totalMl?price/(totalMl/100):null};
}
function specText(item){const p=parsePack(item);const parts=[];if(p.ml&&p.count)parts.push(`${p.ml}ml × ${p.count}${p.container||'件'}`);else if(p.count)parts.push(`${p.count}${p.container||'件'}装`);if(p.unitPerPiece)parts.push(`约 ¥${yuan(p.unitPerPiece)}/${p.container||'件'}`);if(p.unitPer100ml)parts.push(`约 ¥${yuan(p.unitPer100ml)}/100ml`);return parts.join('｜');}
function strictRelevant(item,q){const intent=detectIntent(q);const text=itemText(item);const ntext=norm(text);if(hardExcludes.some(x=>ntext.includes(norm(x))))return false;if(intent.wantsBeverage){if(beverageExcludes.some(x=>ntext.includes(norm(x))))return false;if(!categoryOk(item,intent))return false;if(!parsePack(item).unitPer100ml)return false;}if(intent.brandKeys.length){if(!titleBrandOk(item,intent))return false;if(!textBrandOk(item,intent))return false;}if(!categoryOk(item,intent))return false;if(!attrOk(item,intent))return false;if(!intent.brandKeys.length&&!intent.catKeys.length){const qn=norm(q);if(qn.length>=2&&!ntext.includes(qn.slice(0,Math.min(4,qn.length))))return false}return true;}
function score(item,q){const intent=detectIntent(q);const title=itemTitle(item);const text=itemText(item);let s=0;for(const k of intent.brandKeys){if(hitsAny(title,brandDict[k]))s+=600;if(hitsAny(text,brandDict[k]))s+=150}for(const k of intent.catKeys){if(hitsAny(title,catDict[k]))s+=220;else if(hitsAny(text,catDict[k]))s+=80}for(const k of intent.attrs){if(hitsAny(title,attrDict[k]))s+=500;else if(hitsAny(text,attrDict[k]))s+=200}const qn=norm(q);if(norm(title).includes(qn))s+=800;const pack=parsePack(item);if(intent.wantsBeverage&&pack.unitPer100ml)s+=120;return s;}
function compareValue(item,q){const intent=detectIntent(q);const p=parsePack(item);if(intent.wantsBeverage&&p.unitPer100ml)return p.unitPer100ml;if(p.unitPerPiece)return p.unitPerPiece;return priceOf(item)}
function channelType(item){const text=itemText(item);if(/官方旗舰店|品牌旗舰店|旗舰店|官方店|官方商城|官方旗舰|官方|京东自营|自营/.test(text))return 'official';if(/渠道|批发|厂家|工厂|源头|代购|尾货|清仓/.test(text))return 'channel';return 'normal'}
function best(list,q,type,platform){return list.filter(x=>x.platform===platform&&channelType(x)===type&&strictRelevant(x,q)).sort((a,b)=>compareValue(a,q)-compareValue(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function bestAcross(list,q,type){return platforms.map(([p])=>best(list,q,type,p)).filter(Boolean).sort((a,b)=>compareValue(a,q)-compareValue(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function showLoading(){const s=$('summary');s.innerHTML='';for(let i=0;i<3;i++){const d=document.createElement('div');d.className='loading';s.appendChild(d)}}
function platformMini(list,q,type){return `<div class="platforms">${platforms.map(([p,n])=>{const item=best(list,q,type,p);const spec=item?specText(item):'';return `<div class="p"><div class="p-name">${n}</div>${item?`<div class="p-price">¥${yuan(priceOf(item))}</div><div class="p-unit">${spec.split('｜').slice(-1)[0]||''}</div>`:`<div class="p-empty">待接入/暂无</div>`}</div>`}).join('')}</div>`}
function card(type,title,desc,item,list,q){const platform=item?platforms.find(x=>x[0]===item.platform)?.[1]:'';const spec=item?specText(item):'';return `<section class="deal-card"><div class="deal-head"><div><div class="deal-type">${desc}</div><div class="deal-title">${title}</div></div><div class="badge ${type}">${platform||'暂无'}</div></div><div class="best"><div>${item?`<div class="price"><small>¥</small>${yuan(priceOf(item))}</div><div class="source">${platform} · ${item.shop_name||item.brand_name||''}<br>${item.goods_name||''}</div>${spec?`<div class="spec">${spec}</div>`:''}`:`<div class="price"><small>¥</small>--</div><div class="source">没有通过意图匹配的真实商品。</div>`}</div><button class="buy" ${item?`data-key="${item._key}"`:''} ${item?'':'disabled'}>去购买</button></div>${platformMini(list,q,type)}</section>`}
function render(list,q=effectiveKeyword){const filtered=list.filter(x=>strictRelevant(x,q));const keyed={};filtered.forEach((x,i)=>{x._key='k'+i;keyed[x._key]=x});window.__goods=keyed;const s=$('summary');s.innerHTML='';if(!filtered.length){s.innerHTML='<div class="empty">暂无可靠匹配。为了避免错品，已过滤掉不满足品牌、品类或强属性的结果。</div>';return}for(const [type,title,desc] of groups){const item=bestAcross(filtered,q,type);s.insertAdjacentHTML('beforeend',card(type,title,desc,item,filtered,q))}document.querySelectorAll('.buy[data-key]').forEach(b=>b.onclick=e=>buy(window.__goods[e.target.dataset.key]));}
async function search(v){const raw=(v||$('keyword').value||'').trim()||'无糖可口可乐';$('keyword').value=raw;$('status').textContent='正在比价...';showLoading();try{const r=await fetch(`${API_BASE}/api/search?keyword=${encodeURIComponent(raw)}&platform=all&page_size=50`);const d=await r.json();if(!r.ok||d.error)throw new Error(d.message||d.error||'搜索失败');effectiveKeyword=d.keyword||raw;render(d.goods_list||[],effectiveKeyword);$('status').textContent=`“${effectiveKeyword}” 已按最新意图匹配和单位价汇总。`}catch(e){$('summary').innerHTML='<div class="empty">搜索失败：'+e.message+'</div>';$('status').textContent='搜索失败'}}
async function buy(item){if(!item)return;try{toast('正在生成购买链接...');let endpoint,body;if(item.platform==='jd'){endpoint='/api/jd/link';body={sku_id:item.sku_id,material_url:item.material_url,coupon_url:item.coupon_url}}else if(item.platform==='pdd'){endpoint='/api/pdd/link';body={goods_sign:item.goods_sign}}else{toast('该平台真实转链未接入');return}const r=await fetch(`${API_BASE}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok||d.error_response)throw new Error(d.error_response?.sub_msg||d.jd_error?.message||d.message||'生成失败');const link=d.mobile_short_url||d.short_url||d.mobile_url||d.click_url||d.url||d.schema_url;if(link)location.href=link;else toast('没有返回链接')}catch(e){toast('生成失败：'+e.message)}}
$('form').onsubmit=e=>{e.preventDefault();search()};hotWords.forEach(w=>{const b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=()=>search(w);$('chips').appendChild(b)});search('无糖可口可乐');
</script>
</body>
</html>
