<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>价比比</title>
  <style>
    :root{--red:#ff4d4f;--orange:#ff8a3d;--bg:#f6f7f9;--card:#fff;--text:#20242a;--muted:#7a7f89;--line:#eceef2;--dark:#20242a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}button,input{font:inherit}.app{max-width:980px;margin:0 auto;min-height:100vh;padding-bottom:84px}.hero{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;padding:22px 16px 18px;position:sticky;top:0;z-index:3;box-shadow:0 8px 24px rgba(255,77,79,.2)}.top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}h1{margin:0;font-size:28px}.slogan{font-size:13px;opacity:.9}.search{display:flex;gap:8px}.search input{flex:1;border:0;border-radius:999px;padding:13px 16px;font-size:16px;outline:0}.search button,.buy,.pill{border:0;border-radius:999px;font-weight:800;cursor:pointer}.search button{padding:0 20px;background:#222;color:#fff}.bar{display:flex;gap:8px;overflow:auto;padding:12px 16px 0}.bar button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;white-space:nowrap;color:#555}.bar button.active{background:var(--dark);color:#fff;border-color:var(--dark)}.hot{padding:14px 16px 4px}.hot-title{font-size:15px;font-weight:800;margin-bottom:10px}.hot-list{display:flex;flex-wrap:wrap;gap:8px}.pill{background:#fff;padding:8px 12px;color:#555;border:1px solid var(--line);font-weight:600}.status{padding:14px 16px;color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:0 16px}.card{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06)}.pic{aspect-ratio:1/1;background:#eee;position:relative}.pic img{width:100%;height:100%;object-fit:cover;display:block}.badge,.score{position:absolute;left:8px;border-radius:999px;font-size:11px;font-weight:800}.badge{top:8px;background:rgba(32,36,42,.86);color:#fff;padding:4px 8px}.score{bottom:8px;background:rgba(255,255,255,.94);color:#333;padding:3px 7px}.fav{position:absolute;right:8px;top:8px;width:34px;height:34px;border:0;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 3px 10px rgba(0,0,0,.12);font-size:18px;color:var(--red)}.info{padding:10px}.title{font-size:14px;line-height:1.35;height:38px;overflow:hidden}.meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px;margin-top:6px}.tagsmini{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.trusttag{font-size:11px;border-radius:999px;background:#f3f4f6;color:#555;padding:3px 6px}.official{background:#fff1f0!important;color:#cf1322!important}.self{background:#fff7e6!important;color:#ad6800!important}.auth{background:#f6ffed!important;color:#389e0d!important}.channel{background:#f0f5ff!important;color:#1d39c4!important}.compat{background:#f9f0ff!important;color:#722ed1!important}.risk{background:#fffbe6!important;color:#ad8b00!important}.sandbox{background:#e6f4ff!important;color:#0958d9!important}.coupon{display:inline-block;margin-top:7px;color:var(--red);border:1px solid rgba(255,77,79,.35);border-radius:6px;padding:2px 5px;font-size:12px}.price{margin-top:6px;color:var(--red);font-size:22px;font-weight:900}.price small{font-size:12px}.old{font-size:12px;color:#999;text-decoration:line-through}.buy{width:100%;margin-top:10px;padding:11px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff}.empty{text-align:center;color:#888;padding:50px 16px}.panel{margin:0 16px 12px;background:#fff;border-radius:18px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.05)}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#222;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:8;max-width:86%;text-align:center}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(980px,100%);display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-top:1px solid var(--line);padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:4}.nav button{border:0;background:transparent;color:#777;font-size:12px;padding:4px}.nav b{display:block;font-size:20px;line-height:20px;margin-bottom:2px}.nav button.active{color:var(--red);font-weight:800}.history-list{display:flex;flex-wrap:wrap;gap:8px}.clear{float:right;border:0;background:#f2f3f5;color:#666;border-radius:999px;padding:6px 10px;font-size:12px}.skeleton{height:100%;min-height:260px;background:linear-gradient(90deg,#eee,#f7f7f7,#eee);background-size:200% 100%;animation:shine 1.2s infinite}@keyframes shine{to{background-position:-200% 0}}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:7;display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(980px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:24px 24px 0 0}.sheet-head{position:sticky;top:0;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);z-index:1}.close{border:0;background:#f3f4f6;border-radius:999px;width:34px;height:34px;font-size:20px}.detail-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eee}.detail-body{padding:14px}.detail-title{font-size:18px;font-weight:800;line-height:1.35}.detail-row{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:13px;margin-top:8px}.detail-price{margin-top:12px;color:var(--red);font-size:30px;font-weight:900}.detail-buy{width:100%;margin-top:14px;padding:14px;color:#fff;background:linear-gradient(135deg,var(--red),var(--orange));font-size:16px;border:0;border-radius:999px;font-weight:800}@media(min-width:760px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}.hero{border-radius:0 0 24px 24px}.modal{align-items:center}.sheet{border-radius:24px;max-width:560px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero"><div class="top"><h1>价比比</h1><div class="slogan">四平台沙盒同步</div></div><form id="form" class="search"><input id="keyword" value="小米充电宝" placeholder="搜品牌+商品，比如：小米充电宝"><button>搜索</button></form></section>
    <div class="bar" id="platforms"><button class="active" data-platform="all">全部</button><button data-platform="pdd">拼多多</button><button data-platform="jd">京东</button><button data-platform="tb">淘宝·沙盒</button><button data-platform="douyin">抖音·沙盒</button></div>
    <div class="bar" id="sorts"><button class="active" data-sort="smart">低价优先</button><button data-sort="safe">稳妥优先</button><button data-sort="match">最相关</button><button data-sort="price">券后价</button><button data-sort="sales">销量</button></div>
    <section id="hot" class="hot"><div class="hot-title">热门搜索</div><div id="hotList" class="hot-list"></div></section>
    <div id="status" class="status">准备好了。</div><main id="grid" class="grid"></main><div id="empty" class="empty" style="display:none">暂无商品</div><div class="foot" style="text-align:center;color:#999;font-size:12px;padding:20px">淘宝/抖音目前为沙盒数据，用于统一字段和前端同步。价格、优惠券和库存以平台页面为准。</div>
  </div>
  <nav class="nav"><button class="active" data-view="home"><b>⌂</b>首页</button><button data-view="history"><b>↺</b>历史</button><button data-view="fav"><b>★</b>收藏</button><button data-view="me"><b>•</b>我的</button></nav>
  <div id="modal" class="modal"><div class="sheet"><div class="sheet-head"><strong>商品详情</strong><button id="closeModal" class="close">×</button></div><div id="detail"></div></div></div><div id="toast" class="toast"></div>
<script>
const API_BASE='https://jiabibi-api.onrender.com';
const hotWords=['小米充电宝','安克充电宝','维达纸巾','蓝月亮洗衣液','苹果手机壳','华为耳机','得力文具','美的电饭煲'];
const PAGE_SIZE=20, PER_PLATFORM_LIMIT=4, SINGLE_PLATFORM_LIMIT=8;
let goods=[], sort='smart', view='home', platform='all', lastKeyword='小米充电宝', loading=false;
const $=id=>document.getElementById(id);
const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');
const sales=s=>String(s||'').includes('万')?parseFloat(s)*10000:(parseInt(String(s||'').replace(/\D/g,''))||0);
const getLS=(k,d=[])=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};
const setLS=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const itemKey=item=>`${item.platform||'pdd'}:${item.goods_sign||item.sku_id||item.goods_id||item.material_url||item.goods_name}`;
const platformName=p=>({pdd:'拼多多',jd:'京东',tb:'淘宝',douyin:'抖音'}[p]||p);
const brandMap=[['小米',['小米','xiaomi','mi','redmi','米家']],['安克',['安克','anker']],['维达',['维达','vinda']],['蓝月亮',['蓝月亮']],['苹果',['苹果','apple','iphone']],['华为',['华为','huawei']],['荣耀',['荣耀','honor']],['美的',['美的','midea']],['得力',['得力','deli']],['公牛',['公牛','bull']],['飞利浦',['飞利浦','philips']]];
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1700)}
function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'')}
function detectBrand(q){const nq=norm(q);for(const [name,aliases] of brandMap){if(aliases.some(a=>nq.includes(norm(a))))return {name,aliases:aliases.map(norm)}}return null}
function itemText(item){return norm(`${item.goods_name||''} ${item.brand_name||''} ${item.shop_name||''} ${(item.unified_tags||[]).join(' ')}`)}
function isCompatOnly(item,brand){if(!brand)return false;const raw=String(item.goods_name||'')+String(item.brand_name||'')+String(item.shop_name||'');return new RegExp(`适用|适配|兼容|通用|for|保护壳|手机壳|配件`).test(raw)&&brand.aliases.some(a=>norm(raw).includes(a))}
function brandMatchScore(item,brand){if(!brand)return 0;const title=norm(item.goods_name), b=norm(item.brand_name), shop=norm(item.shop_name);const aliasHit=s=>brand.aliases.some(a=>s.includes(a));if(isCompatOnly(item,brand))return -260;if(aliasHit(b))return 420;if(aliasHit(shop)&&/官方|旗舰|自营|专卖/.test(String(item.shop_name||'')))return 360;if(aliasHit(title)&&title.indexOf(brand.aliases.find(a=>title.includes(a))||'')<=6)return 300;if(aliasHit(title))return 140;return -520}
function channelInfo(item){const text=String(item.goods_name||'')+String(item.brand_name||'')+String(item.shop_name||'')+(item.unified_tags||[]).join('');let labels=[],trust=0,risk=0;if(item.source==='sandbox'){labels.push({text:'沙盒',cls:'sandbox'});risk+=5}if(/官方旗舰店|品牌旗舰店|旗舰店|官方店|官方商城/.test(text)||/官方旗舰|旗舰店|官方/.test(String(item.shop_name||''))){labels.push({text:'官方旗舰',cls:'official'});trust+=90}else if(/京东自营|自营/.test(text)){labels.push({text:'自营',cls:'self'});trust+=80}else if(/授权|专卖店|专营店/.test(text)){labels.push({text:'授权/专营',cls:'auth'});trust+=45}else if(/渠道|批发|厂家|工厂|源头|代购|尾货|清仓/.test(text)){labels.push({text:'渠道商',cls:'channel'});trust+=10;risk+=15}else{labels.push({text:'普通店',cls:'channel'});trust+=20}if(/适用|适配|兼容|通用|for|保护壳|手机壳|配件|替换/.test(text)){labels.push({text:'适配款',cls:'compat'});risk+=55}return {labels,trust,risk}}
function keywordParts(q){const s=norm(q);const parts=new Set();for(let i=0;i<s.length;i++)for(let len=2;len<=Math.min(4,s.length-i);len++)parts.add(s.slice(i,i+len));return [...parts]}
function relevanceScore(item,q){const kw=norm(q), title=norm(item.goods_name), brand=detectBrand(q), info=channelInfo(item);if(!kw)return 0;let score=brandMatchScore(item,brand);if(title.includes(kw))score+=520;if(title.startsWith(kw))score+=180;let hit=0;for(const p of keywordParts(q)){if(title.includes(p)){hit++;score+=p.length*16}else if(itemText(item).includes(p))score+=p.length*5}score+=Math.min(160,hit*18);score-=info.risk;if((item.platform||'pdd')==='pdd')score+=platform==='all'?45:20;else if((item.platform||'')==='jd')score-=platform==='all'?35:0;return Math.round(score)}
function priceOf(item){return Number(item.coupon_price_yuan||item.min_group_price_yuan||999999)}
function dealScore(item){const price=priceOf(item);let s=0;if(price>0)s+=Math.max(0,125-Math.log(price+1)*28);s+=Number(item.coupon_discount_yuan||0)>0?Math.min(60,Number(item.coupon_discount_yuan||0)*3):0;s+=Math.min(30,Math.log10(sales(item.sales_tip)+1)*12);return s}
function finalScore(item){const info=item._channel||channelInfo(item), rel=item._match_score??relevanceScore(item,lastKeyword);if(sort==='safe')return rel*1.15+info.trust*1.2+dealScore(item)*0.45-info.risk*1.5;if(sort==='match')return rel*1.5+info.trust*0.25-info.risk;if(sort==='sales')return sales(item.sales_tip);if(sort==='price')return -priceOf(item);return rel*1.05+dealScore(item)*0.9+info.trust*0.25-info.risk*1.2}
function prepare(list){return list.map(x=>{x._channel=channelInfo(x);x._match_score=relevanceScore(x,lastKeyword);x._final_score=finalScore(x);return x}).filter(x=>x._match_score>-220 || x.source==='sandbox')}
function sorted(list){const a=prepare([...list]);if(sort==='price')a.sort((x,y)=>priceOf(x)-priceOf(y)||y._match_score-x._match_score);else if(sort==='sales')a.sort((x,y)=>sales(y.sales_tip)-sales(x.sales_tip)||y._final_score-x._final_score);else a.sort((x,y)=>y._final_score-x._final_score);return a}
function pickTopByPlatform(list){const arr=sorted(list), buckets={pdd:[],jd:[],tb:[],douyin:[]};for(const item of arr){const p=item.platform||'pdd';if(!buckets[p])buckets[p]=[];if(buckets[p].length<PER_PLATFORM_LIMIT)buckets[p].push(item)}return [...buckets.pdd,...buckets.jd,...buckets.tb,...buckets.douyin]}
function limitSingle(list){return sorted(list).slice(0,SINGLE_PLATFORM_LIMIT)}
function labelHtml(item){const info=item._channel||channelInfo(item);let labels=[...info.labels];if(priceOf(item)>0&&priceOf(item)<30)labels.push({text:'低价',cls:'risk'});return labels.slice(0,3).map(x=>`<span class="trusttag ${x.cls}">${x.text}</span>`).join('')}
function setStatus(s){$('status').textContent=s}
function showLoading(){const grid=$('grid');grid.innerHTML='';$('empty').style.display='none';for(let i=0;i<8;i++){const c=document.createElement('article');c.className='card';c.innerHTML='<div class="skeleton"></div>';grid.appendChild(c)}}
function card(item){const c=document.createElement('article');c.className='card';c.innerHTML=`<div class="pic"><img src="${item.goods_thumbnail_url||item.goods_image_url||''}" loading="lazy"><span class="badge">${platformName(item.platform)}</span><span class="score">相关 ${item._match_score??relevanceScore(item,lastKeyword)}</span><button class="fav">${isFav(item)?'★':'☆'}</button></div><div class="info"><div class="title">${item.goods_name||''}</div><div class="tagsmini">${labelHtml(item)}</div><div class="meta"><span>${item.brand_name||platformName(item.platform)}</span><span>销量 ${item.sales_tip||'-'}</span></div><div class="coupon">券 ¥${yuan(item.coupon_discount_yuan)}</div><div class="price"><small>¥</small>${yuan(item.coupon_price_yuan)}</div><div class="old">¥${yuan(item.min_group_price_yuan)}</div><button class="buy">去购买</button></div>`;c.onclick=()=>openDetail(item);c.querySelector('.fav').onclick=e=>{e.stopPropagation();toggleFav(item)};c.querySelector('.buy').onclick=e=>{e.stopPropagation();buy(item)};return c}
function renderList(list,label){const grid=$('grid');grid.innerHTML='';const arr=platform==='all'?pickTopByPlatform(list):limitSingle(list);$('empty').style.display=arr.length?'none':'block';setStatus(label||`每个平台最多显示 ${PER_PLATFORM_LIMIT} 个最接近结果。`);arr.forEach(x=>grid.appendChild(card(x)))}
function renderHistory(){const h=getLS('history');$('grid').innerHTML='';$('empty').style.display=h.length?'none':'block';setStatus('搜索历史');const p=document.createElement('section');p.className='panel';p.innerHTML='<button class="clear">清空</button><h2>最近搜索</h2><div class="history-list"></div>';p.querySelector('.clear').onclick=()=>{setLS('history',[]);renderHistory()};const box=p.querySelector('.history-list');h.forEach(w=>{const b=document.createElement('button');b.className='pill';b.textContent=w;b.onclick=()=>search(w);box.appendChild(b)});$('grid').appendChild(p)}
function renderMe(){$('grid').innerHTML='';$('empty').style.display='none';setStatus('我的');const p=document.createElement('section');p.className='panel';p.innerHTML='<h2>价比比 MVP</h2><p>已切换到统一搜索接口：拼多多/京东真实或fallback，淘宝/抖音沙盒。</p>';$('grid').appendChild(p)}
function render(){ $('hot').style.display=view==='home'?'block':'none'; if(view==='history')return renderHistory(); if(view==='fav')return renderList(getLS('favorites'),'我的收藏'); if(view==='me')return renderMe(); renderList(goods,goods.length?`“${lastKeyword}”：统一四平台同步，淘宝/抖音为沙盒。`:'准备好了。')}
async function fetchPage(q){const r=await fetch(`${API_BASE}/api/search?keyword=${encodeURIComponent(q)}&platform=${encodeURIComponent(platform)}&page=1&page_size=${PAGE_SIZE}`);const d=await r.json();if(!r.ok||d.error)throw new Error(d.message||d.error||'搜索失败');return d}
async function search(q){q=(q||$('keyword').value||'').trim()||'小米充电宝';lastKeyword=q;$('keyword').value=q;view='home';document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view==='home'));setStatus('搜索中...');showLoading();try{loading=true;const d=await fetchPage(q);goods=prepare(d.goods_list||[]);let h=getLS('history').filter(x=>x!==q);h.unshift(q);setLS('history',h.slice(0,20));loading=false;render()}catch(e){loading=false;goods=[];$('grid').innerHTML='';$('empty').style.display='block';setStatus('搜索失败：'+e.message);toast('搜索失败')}}
function openDetail(item){$('detail').innerHTML=`<img class="detail-img" src="${item.goods_image_url||item.goods_thumbnail_url||''}"><div class="detail-body"><div class="detail-title">${item.goods_name||''}</div><div class="tagsmini">${labelHtml(item)}</div><div class="detail-row"><span>${platformName(item.platform)} · ${item.brand_name||''}</span><span>${item.source==='sandbox'?'沙盒':'真实'}</span></div><div class="detail-price">¥${yuan(item.coupon_price_yuan)}</div><div class="old">原价 ¥${yuan(item.min_group_price_yuan)} · 优惠券 ¥${yuan(item.coupon_discount_yuan)}</div><button class="detail-buy">去购买</button></div>`;$('detail').querySelector('.detail-buy').onclick=()=>buy(item);$('modal').classList.add('show')}
function closeDetail(){$('modal').classList.remove('show')}
function isFav(item){const key=itemKey(item);return getLS('favorites').some(x=>itemKey(x)===key)}
function toggleFav(item){let a=getLS('favorites');const key=itemKey(item);const has=a.some(x=>itemKey(x)===key);a=has?a.filter(x=>itemKey(x)!==key):[item,...a].slice(0,80);setLS('favorites',a);toast(has?'已取消收藏':'已收藏');render()}
async function buy(item){if(item.source==='sandbox'){toast('沙盒商品暂不跳转');return}try{toast('正在生成购买链接...');let endpoint,body;if((item.platform||'pdd')==='jd'){endpoint='/api/jd/link';body={sku_id:item.sku_id,material_url:item.material_url,coupon_url:item.coupon_url}}else{endpoint='/api/pdd/link';body={goods_sign:item.goods_sign}}const r=await fetch(`${API_BASE}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok||d.error_response)throw new Error(d.error_response?.sub_msg||d.jd_error?.message||d.message||'生成失败');const link=d.mobile_short_url||d.short_url||d.mobile_url||d.click_url||d.url||d.schema_url;if(link)location.href=link;else toast('没有返回链接')}catch(e){toast('生成失败：'+e.message)}}
$('form').onsubmit=e=>{e.preventDefault();search()};$('closeModal').onclick=closeDetail;$('modal').onclick=e=>{if(e.target.id==='modal')closeDetail()};document.querySelectorAll('#platforms button[data-platform]').forEach(b=>b.onclick=()=>{platform=b.dataset.platform;document.querySelectorAll('#platforms button').forEach(x=>x.classList.toggle('active',x===b));search(lastKeyword)});document.querySelectorAll('#sorts button').forEach(b=>b.onclick=()=>{sort=b.dataset.sort;document.querySelectorAll('#sorts button').forEach(x=>x.classList.toggle('active',x===b));render()});document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{view=b.dataset.view;document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x===b));render()});hotWords.forEach(w=>{const b=document.createElement('button');b.className='pill';b.textContent=w;b.onclick=()=>search(w);$('hotList').appendChild(b)});search('小米充电宝');
</script>
</body>
</html>
