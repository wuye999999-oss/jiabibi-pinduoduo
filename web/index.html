let effectiveKeyword='ж— зі–еҸҜеҸЈеҸҜд№җ', providerState=[];
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1800)}
function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_гҖҗгҖ‘\[\]пјҲпјү()пјҢ,гҖӮ.!пјҒ:пјҡ/\\]+/g,'')}

function hitsAny(text,arr){const t=norm(text);return arr.some(x=>t.includes(norm(x)))}
const brandDict={xiaomi:['е°Ҹзұі','xiaomi','redmi','зұіе®¶'],anker:['е®үе…Ӣ','anker'],vinda:['з»ҙиҫҫ','vinda'],blue:['и“қжңҲдә®'],apple:['иӢ№жһң','apple','iphone'],huawei:['еҚҺдёә','huawei'],coke:['еҸҜеҸЈеҸҜд№җ','coca-cola','cocacola','coca','cola'],sprite:['йӣӘзў§','sprite'],fanta:['иҠ¬иҫҫ','fanta'],pepsi:['зҷҫдәӢ','pepsi']};
const beverageBrandKeys=['coke','sprite','fanta','pepsi'];

const attrDict={noSugar:['ж— зі–','йӣ¶зі–','0зі–','йӣ¶еәҰ','zero','йӣ¶еҚЎ','0еҚЎ','ж— и”—зі–'],lowSugar:['дҪҺзі–','е°‘зі–'],caffeineFree:['ж— е’–е•Ўеӣ ','и„ұе’–е•Ўеӣ ']};
const hardExcludes=['еҲ»еӯ—','жҝҖе…ү','зӨјзү©','зӨјзӣ’','ж‘Ҷд»¶','жҢӮд»¶','й’ҘеҢҷжүЈ','иҙҙзәё','жө·жҠҘ','жЁЎеһӢ','жүӢеҠһ','з©әз“¶','ж”¶и—Ҹ','е‘Ёиҫ№','е®ҡеҲ¶','жҠұжһ•','иЎЈжңҚ','жқҜеӯҗ','ж°ҙжқҜ','ејҖз“¶еҷЁ','й…Қд»¶','йҖӮз”Ё','е…је®№'];
const officialWords=['е®ҳж–№ж——иҲ°еә—','е“ҒзүҢж——иҲ°еә—','ж——иҲ°еә—','е®ҳж–№еә—','е®ҳж–№е•ҶеҹҺ','е®ҳж–№ж——иҲ°','дә¬дёңиҮӘиҗҘ','иҮӘиҗҘ'];
const channelWords=['жё йҒ“','жү№еҸ‘','еҺӮе®¶','е·ҘеҺӮ','жәҗеӨҙ','д»Јиҙӯ','е°ҫиҙ§','жё…д»“','д»“еә“','д»“еӮЁ','йҮҸиҙ©','ж•ҙз®ұжү№еҸ‘','жү№еҸ‘д»·','еӣўиҙӯ','зү№еҚ–','еә•д»·','еӨ§еҢ…иЈ…','е•Ҷз”Ё'];
const caseModels=['iphone15promax','iphone15pro','iphone15plus','iphone15','iphone14promax','iphone14pro','iphone14plus','iphone14','е°Ҹзұі14ultra','е°Ҹзұі14pro','е°Ҹзұі14','еҚҺдёәmate60pro','еҚҺдёәmate60','еҚҺдёәpura70','еҚҺдёәp70'];
function detectIntent(q){const nq=norm(q);const brandKeys=[];for(const [key,arr] of Object.entries(brandDict)){if(arr.some(x=>nq.includes(norm(x))))brandKeys.push(key)}const catKeys=[];for(const [key,arr] of Object.entries(catDict)){if(arr.some(x=>nq.includes(norm(x))))catKeys.push(key)}if(brandKeys.some(k=>beverageBrandKeys.includes(k))&&!catKeys.includes('beverage'))catKeys.push('beverage');const attrs=[];for(const [key,arr] of Object.entries(attrDict)){if(arr.some(x=>nq.includes(norm(x))))attrs.push(key)}const model=caseModels.find(m=>nq.includes(norm(m)))||'';const cap=(nq.match(/(\d{4,6})(?:mah|жҜ«е®ү)/)||[])[1]||'';const watt=(nq.match(/(\d{2,3})w/)||[])[1]||'';return {brandKeys,catKeys,attrs,model,cap,watt,wantsBeverage:catKeys.includes('beverage'),wantsPaper:catKeys.includes('paper'),wantsLaundry:catKeys.includes('laundry'),wantsPower:catKeys.includes('power'),wantsCase:catKeys.includes('case')}}
function categoryOk(item,intent){if(!intent.catKeys.length)return true;return intent.catKeys.some(k=>hitsAny(itemText(item),catDict[k]))}
function attrOk(item,intent){if(!intent.attrs.length)return true;return intent.attrs.every(k=>hitsAny(itemText(item),attrDict[k]))}
function brandOk(item,intent){if(!intent.brandKeys.length)return true;return intent.brandKeys.some(k=>hitsAny(itemTitle(item),brandDict[k])&&hitsAny(itemText(item),brandDict[k]))}
function unitToMl(v,u){u=String(u||'').toLowerCase();return (u==='l'||u==='еҚҮ')?v*1000:v}
function unitToKg(v,u){u=String(u||'').toLowerCase();if(u==='kg'||u==='е…¬ж–Ө')return v;if(u==='ж–Ө')return v*0.5;return v/1000}
function parseBeverage(item){const text=itemText(item).replace(/[Г—пјёxX]/g,'*').replace(/жҜ«еҚҮ/g,'ml');const price=priceOf(item);let ml=0,count=0,container='д»¶';const set=(vol,u,c,ct)=>{ml=unitToMl(Number(vol),u);count=Number(c);container=ct||container};let m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|еҚҮ)\s*[*]\s*(\d+)\s*(з“¶|зҪҗ|еҗ¬)?/);if(m)set(m[1],m[2],m[3],m[4]);if(!count){m=text.match(/(\d+)\s*(з“¶|зҪҗ|еҗ¬).{0,8}?(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|еҚҮ)/);if(m)set(m[3],m[4],m[1],m[2])}if(!count){m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|еҚҮ).{0,12}?(\d+)\s*(з“¶|зҪҗ|еҗ¬)/);if(m)set(m[1],m[2],m[3],m[4])}if(!ml){m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|еҚҮ)/);if(m)ml=unitToMl(Number(m[1]),m[2])}if(!count){m=text.match(/(\d+)\s*(з“¶|зҪҗ|еҗ¬)/);if(m){count=Number(m[1]);container=m[2]}}const totalMl=ml&&count?ml*count:0;return {kind:'beverage',ml,count,container,totalMl,unit:totalMl?price/(totalMl/100):null,piece:count?price/count:null}}
function parsePaper(item){const text=itemText(item).replace(/[Г—пјёxX]/g,'*');const price=priceOf(item);let draws=0,packs=0,layers=0;let m=text.match(/(\d+)\s*(жҠҪ|еј )\s*[*]\s*(\d+)\s*(еҢ…|жҸҗ|з®ұ|з»„)?/);if(m){draws=Number(m[1]);packs=Number(m[3])}if(!packs){m=text.match(/(\d+)\s*(еҢ…|жҸҗ|з®ұ).{0,8}?(\d+)\s*(жҠҪ|еј )/);if(m){packs=Number(m[1]);draws=Number(m[3])}}if(!draws){m=text.match(/(\d+)\s*(жҠҪ|еј )/);if(m)draws=Number(m[1])}if(!packs){m=text.match(/(\d+)\s*(еҢ…|жҸҗ|з®ұ)/);if(m)packs=Number(m[1])}m=text.match(/(\d+)\s*еұӮ/);if(m)layers=Number(m[1]);const total=draws&&packs?draws*packs:0;return {kind:'paper',draws,packs,layers,total,unit:total?price/(total/100):null,piece:packs?price/packs:null}}
function parseLaundry(item){const text=itemText(item).replace(/[Г—пјёxX]/g,'*').replace(/жҜ«еҚҮ/g,'ml');const price=priceOf(item);let kg=0,l=0,count=1,container='д»¶';let m=text.match(/(\d+(?:\.\d+)?)\s*(kg|KG|е…¬ж–Ө|ж–Ө|g|G|е…Ӣ|ml|ML|mL|l|L|еҚҮ)\s*[*]\s*(\d+)\s*(з“¶|иўӢ|жЎ¶|д»¶)?/);if(m){count=Number(m[3]);container=m[4]||container;if(/ml|ML|mL|l|L|еҚҮ/.test(m[2]))l=unitToMl(Number(m[1]),m[2])/1000*count;else kg=unitToKg(Number(m[1]),m[2])*count}if(!kg&&!l){m=text.match(/(\d+(?:\.\d+)?)\s*(kg|KG|е…¬ж–Ө|ж–Ө|g|G|е…Ӣ|ml|ML|mL|l|L|еҚҮ)/);if(m){if(/ml|ML|mL|l|L|еҚҮ/.test(m[2]))l=unitToMl(Number(m[1]),m[2])/1000;else kg=unitToKg(Number(m[1]),m[2])}}if(count===1){m=text.match(/(\d+)\s*(з“¶|иўӢ|жЎ¶)/);if(m){count=Number(m[1]);container=m[2]}}return {kind:'laundry',kg,l,count,container,unit:kg?price/kg:(l?price/l:null),piece:count?price/count:null}}
function parsePower(item){const text=norm(itemText(item));const price=priceOf(item);const cap=Number((text.match(/(\d{4,6})(?:mah|жҜ«е®ү)/)||[])[1]||0);const watt=Number((text.match(/(\d{2,3})w/)||[])[1]||0);return {kind:'power',cap,watt,unit:cap?price/(cap/10000):null,piece:null}}

function parseSpec(item,q){const intent=detectIntent(q);if(intent.wantsBeverage)return parseBeverage(item);if(intent.wantsPaper)return parsePaper(item);if(intent.wantsLaundry)return parseLaundry(item);if(intent.wantsPower)return parsePower(item);if(intent.wantsCase)return parseCase(item);return parseBeverage(item)}
function specText(item,q){const s=parseSpec(item,q);const parts=[];if(s.kind==='beverage'){if(s.ml&&s.count)parts.push(`${s.ml}ml Г— ${s.count}${s.container||'д»¶'}`);if(s.piece)parts.push(`зәҰ ВҘ${yuan(s.piece)}/${s.container||'д»¶'}`);if(s.unit)parts.push(`зәҰ ВҘ${yuan(s.unit)}/100ml`)}else if(s.kind==='paper'){if(s.draws&&s.packs)parts.push(`${s.draws}жҠҪ Г— ${s.packs}еҢ…`);if(s.layers)parts.push(`${s.layers}еұӮ`);if(s.unit)parts.push(`зәҰ ВҘ${yuan(s.unit)}/100жҠҪ`);if(s.piece)parts.push(`зәҰ ВҘ${yuan(s.piece)}/еҢ…`)}else if(s.kind==='laundry'){if(s.kg)parts.push(`${yuan(s.kg)}kg`);if(s.l)parts.push(`${yuan(s.l)}L`);if(s.count>1)parts.push(`${s.count}${s.container}`);if(s.unit)parts.push(`зәҰ ВҘ${yuan(s.unit)}/${s.kg?'kg':'L'}`)}else if(s.kind==='power'){if(s.cap)parts.push(`${s.cap}mAh`);if(s.watt)parts.push(`${s.watt}W`);if(s.unit)parts.push(`зәҰ ВҘ${yuan(s.unit)}/дёҮmAh`)}else if(s.kind==='case'){if(s.model)parts.push(`йҖӮй…Қ ${s.model}`)}return parts.join('пҪң')}
function strictRelevant(item,q){const intent=detectIntent(q), text=itemText(item), ntext=norm(text);if(hardExcludes.some(x=>ntext.includes(norm(x))))return false;if(intent.wantsBeverage&&['з”өжұ ','еҸЈзҪ©','йҳІжҷ’','йҒ®йҳі','еҸ°зҒҜ','зҒҜе…·','жүӢжңәеЈі','дҝқжҠӨеЈі'].some(x=>ntext.includes(norm(x))))return false;if(!brandOk(item,intent)||!categoryOk(item,intent)||!attrOk(item,intent))return false;const spec=parseSpec(item,q);if(intent.wantsBeverage&&!spec.unit)return false;if(intent.wantsPaper&&!spec.unit)return false;if(intent.wantsLaundry&&!spec.unit)return false;if(intent.wantsPower){if(intent.cap&&spec.cap&&Math.abs(spec.cap-Number(intent.cap))>1000)return false;if(intent.watt&&spec.watt&&spec.watt<Number(intent.watt))return false}if(intent.wantsCase&&intent.model&&spec.model!==intent.model)return false;if(!intent.brandKeys.length&&!intent.catKeys.length){const qn=norm(q);if(qn.length>=2&&!ntext.includes(qn.slice(0,Math.min(4,qn.length))))return false}return true}
function score(item,q){const intent=detectIntent(q), title=itemTitle(item), text=itemText(item);let s=0;for(const k of intent.brandKeys){if(hitsAny(title,brandDict[k]))s+=600;if(hitsAny(text,brandDict[k]))s+=150}for(const k of intent.catKeys){if(hitsAny(title,catDict[k]))s+=220;else if(hitsAny(text,catDict[k]))s+=80}for(const k of intent.attrs){if(hitsAny(title,attrDict[k]))s+=500;else if(hitsAny(text,attrDict[k]))s+=200}if(norm(title).includes(norm(q)))s+=800;return s}
function compareValue(item,q){const s=parseSpec(item,q);return s.unit||s.piece||priceOf(item)}
function channelType(item){const text=itemText(item);if(hitsAny(text,officialWords))return 'official';if(hitsAny(text,channelWords))return 'channel';return 'normal'}
function best(list,q,type,platform){return list.filter(x=>x.platform===platform&&channelType(x)===type&&strictRelevant(x,q)).sort((a,b)=>compareValue(a,q)-compareValue(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function bestAcross(list,q,type){return platforms.map(([p])=>best(list,q,type,p)).filter(Boolean).sort((a,b)=>compareValue(a,q)-compareValue(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function showLoading(){const s=$('summary');s.innerHTML='';for(let i=0;i<3;i++){const d=document.createElement('div');d.className='loading';s.appendChild(d)}}
function platformEmptyLabel(platform){const st=providerState.find(x=>x.platform===platform);if(st&&st.source==='provider_placeholder')return 'еҫ…жҺҘе…Ҙ';return 'жңӘиҝ”еӣһ/жңӘиҜҶеҲ«'}
function platformMini(list,q,type){return `<div class="platforms">${platforms.map(([p,n])=>{const item=best(list,q,type,p);const spec=item?specText(item,q):'';return `<div class="p"><div class="p-name">${n}</div>${item?`<div class="p-price">ВҘ${yuan(priceOf(item))}</div><div class="p-unit">${spec.split('пҪң').slice(-1)[0]||''}</div>`:`<div class="p-empty">${platformEmptyLabel(p)}</div>`}</div>`}).join('')}</div>`}
function card(type,item,list,q){const meta=groupMeta[type], platform=item?platforms.find(x=>x[0]===item.platform)?.[1]:'';const spec=item?specText(item,q):'';return `<section class="deal-card"><div class="deal-head"><div><div class="deal-type">${meta.desc}</div><div class="deal-title">${meta.title}</div></div><div class="badge ${type}">${platform||'жҡӮж— '}</div></div><div class="best"><div>${item?`<div class="price"><small>ВҘ</small>${yuan(priceOf(item))}</div><div class="source">${platform} В· ${item.shop_name||item.brand_name||''}<br>${item.goods_name||''}</div>${spec?`<div class="spec">${spec}</div>`:''}`:`<div class="price"><small>ВҘ</small>--</div><div class="source">${meta.hint}</div><div class="hint">иҝҷйҖҡеёёжҳҜжҺҘеҸЈиҰҶзӣ–й—®йўҳпјҢдёҚд»ЈиЎЁе№іеҸ°дёҠз»қеҜ№жІЎжңүиҜҘеә—еһӢгҖӮ</div>`}</div><button class="buy" ${item?`data-key="${item._key}"`:''} ${item?'':'disabled'}>еҺ»иҙӯд№°</button></div>${platformMini(list,q,type)}</section>`}
function render(list,q=effectiveKeyword,providers=[]){providerState=providers||[];const filtered=list.filter(x=>strictRelevant(x,q));const keyed={};filtered.forEach((x,i)=>{x._key='k'+i;keyed[x._key]=x});window.__goods=keyed;const s=$('summary');s.innerHTML='';if(!filtered.length){s.innerHTML='<div class="empty">жҡӮж— еҸҜйқ еҢ№й…ҚгҖӮдёәдәҶйҒҝе…Қй”ҷе“ҒпјҢе·ІиҝҮж»ӨжҺүдёҚж»Ўи¶іе“ҒзүҢгҖҒе“Ғзұ»гҖҒејәеұһжҖ§жҲ–и§„ж јзҡ„з»“жһңгҖӮ</div>';return}for(const type of groups){const item=bestAcross(filtered,q,type);s.insertAdjacentHTML('beforeend',card(type,item,filtered,q))}document.querySelectorAll('.buy[data-key]').forEach(b=>b.onclick=e=>buy(window.__goods[e.target.dataset.key]));}
async function search(v){const raw=(v||$('keyword').value||'').trim()||'ж— зі–еҸҜеҸЈеҸҜд№җ';$('keyword').value=raw;$('status').textContent='жӯЈеңЁжҜ”д»·...';showLoading();try{const r=await fetch(`${API_BASE}/api/search?keyword=${encodeURIComponent(raw)}&platform=all&page_size=50`);const d=await r.json();if(!r.ok||d.error)throw new Error(d.message||d.error||'жҗңзҙўеӨұиҙҘ');effectiveKeyword=d.keyword||raw;render(d.goods_list||[],effectiveKeyword,d.providers||[]);$('status').textContent=`вҖң${effectiveKeyword}вҖқ е·ІжҢүи§„ж ји§„еҲҷеә“гҖҒеә—еһӢе’ҢеҚ•дҪҚд»·жұҮжҖ»гҖӮ`}catch(e){$('summary').innerHTML='<div class="empty">жҗңзҙўеӨұиҙҘпјҡ'+e.message+'</div>';$('status').textContent='жҗңзҙўеӨұиҙҘ'}}
async function buy(item){if(!item)return;try{toast('жӯЈеңЁз”ҹжҲҗиҙӯд№°й“ҫжҺҘ...');let endpoint,body;if(item.platform==='jd'){endpoint='/api/jd/link';body={sku_id:item.sku_id,material_url:item.material_url,coupon_url:item.coupon_url}}else if(item.platform==='pdd'){endpoint='/api/pdd/link';body={goods_sign:item.goods_sign}}else{toast('иҜҘе№іеҸ°зңҹе®һиҪ¬й“ҫжңӘжҺҘе…Ҙ');return}const r=await fetch(`${API_BASE}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok||d.error_response)throw new Error(d.error_response?.sub_msg||d.jd_error?.message||d.message||'з”ҹжҲҗеӨұиҙҘ');const link=d.mobile_short_url||d.short_url||d.mobile_url||d.click_url||d.url||d.schema_url;if(link)location.href=link;else toast('жІЎжңүиҝ”еӣһй“ҫжҺҘ')}catch(e){toast('з”ҹжҲҗеӨұиҙҘпјҡ'+e.message)}}
$('form').onsubmit=e=>{e.preventDefault();search()};hotWords.forEach(w=>{const b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=()=>search(w);$('chips').appendChild(b)});search('ж— зі–еҸҜеҸЈеҸҜд№җ');
</script>
</body>
