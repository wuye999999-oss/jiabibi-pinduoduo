<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>价比比</title>
  <style>
    :root{--red:#ff4d4f;--orange:#ff8a3d;--bg:#f6f7f9;--card:#fff;--text:#20242a;--muted:#7a7f89;--line:#eceef2;--dark:#20242a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}button,input{font:inherit}.app{max-width:980px;margin:0 auto;min-height:100vh;padding-bottom:86px}.hero{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;padding:22px 16px 18px;position:sticky;top:0;z-index:3;box-shadow:0 8px 24px rgba(255,77,79,.2)}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}h1{margin:0;font-size:28px}.slogan{font-size:13px;opacity:.9}.search{display:flex;gap:8px}.search input{flex:1;border:0;border-radius:999px;padding:13px 16px;font-size:16px;outline:0}.search button,.buy,.pill,.more,.detail-buy{border:0;border-radius:999px;font-weight:800;cursor:pointer}.search button{padding:0 20px;background:#222;color:#fff}.bar{display:flex;gap:8px;overflow:auto;padding:12px 16px 0}.bar button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;white-space:nowrap;color:#555}.bar button.active{background:var(--dark);color:#fff;border-color:var(--dark)}.hot{padding:14px 16px 4px}.hot-title{font-size:15px;font-weight:800;margin-bottom:10px}.hot-list{display:flex;flex-wrap:wrap;gap:8px}.pill{background:#fff;padding:8px 12px;color:#555;border:1px solid var(--line);font-weight:600}.status{padding:14px 16px;color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:0 16px}.card{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.06)}.pic{aspect-ratio:1/1;background:#eee;position:relative}.pic img{width:100%;height:100%;object-fit:cover;display:block}.fav{position:absolute;right:8px;top:8px;width:34px;height:34px;border:0;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 3px 10px rgba(0,0,0,.12);font-size:18px;color:var(--red);z-index:1}.badge{position:absolute;left:8px;top:8px;background:rgba(32,36,42,.86);color:#fff;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800}.score{position:absolute;left:8px;bottom:8px;background:rgba(255,255,255,.94);color:#333;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:800}.info{padding:10px}.title{font-size:14px;line-height:1.35;height:38px;overflow:hidden}.meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px;margin-top:6px}.coupon{display:inline-block;margin-top:7px;color:var(--red);border:1px solid rgba(255,77,79,.35);border-radius:6px;padding:2px 5px;font-size:12px}.price{margin-top:6px;color:var(--red);font-size:22px;font-weight:900}.price small{font-size:12px}.old{font-size:12px;color:#999;text-decoration:line-through}.buy{width:100%;margin-top:10px;padding:11px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff}.empty{text-align:center;color:#888;padding:50px 16px}.more-wrap{padding:14px 16px 4px;text-align:center}.more{background:#fff;border:1px solid var(--line);color:#333;padding:12px 26px;box-shadow:0 4px 14px rgba(0,0,0,.05)}.more:disabled{opacity:.55}.panel{margin:0 16px 12px;background:#fff;border-radius:18px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.05)}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#222;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:8;max-width:86%;text-align:center}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(980px,100%);display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-top:1px solid var(--line);padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:4}.nav button{border:0;background:transparent;color:#777;font-size:12px;padding:4px}.nav b{display:block;font-size:20px;line-height:20px;margin-bottom:2px}.nav button.active{color:var(--red);font-weight:800}.history-list{display:flex;flex-wrap:wrap;gap:8px}.clear{float:right;border:0;background:#f2f3f5;color:#666;border-radius:999px;padding:6px 10px;font-size:12px}.skeleton{height:100%;min-height:260px;background:linear-gradient(90deg,#eee,#f7f7f7,#eee);background-size:200% 100%;animation:shine 1.2s infinite}@keyframes shine{to{background-position:-200% 0}}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:7;display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(980px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -10px 36px rgba(0,0,0,.25)}.sheet-head{position:sticky;top:0;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);z-index:1}.close{border:0;background:#f3f4f6;border-radius:999px;width:34px;height:34px;font-size:20px}.detail-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eee}.detail-body{padding:14px}.detail-title{font-size:18px;font-weight:800;line-height:1.35}.detail-row{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:13px;margin-top:8px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.tag{font-size:12px;color:#555;background:#f4f5f7;border-radius:999px;padding:5px 8px}.detail-price{margin-top:12px;color:var(--red);font-size:30px;font-weight:900}.detail-buy{width:100%;margin-top:14px;padding:14px;color:#fff;background:linear-gradient(135deg,var(--red),var(--orange));font-size:16px}@media(min-width:760px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}.hero{border-radius:0 0 24px 24px}.modal{align-items:center}.sheet{border-radius:24px;max-width:560px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero"><div class="top"><h1>价比比</h1><div class="slogan">先比价，再下单</div></div><form id="form" class="search"><input id="keyword" value="充电宝" placeholder="搜商品，比如：充电宝"><button>搜索</button></form></section>
    <div class="bar" id="platforms"><button class="active" data-platform="all">全部</button><button data-platform="pdd">拼多多</button><button data-platform="jd">京东</button><button disabled>淘宝</button></div>
    <div class="bar" id="sorts"><button class="active" data-sort="smart">智能排序</button><button data-sort="match">最相关</button><button data-sort="price">券后价</button><button data-sort="sales">销量</button><button data-sort="coupon">优惠券</button></div>
    <section id="hot" class="hot"><div class="hot-title">热门搜索</div><div id="hotList" class="hot-list"></div></section>
    <div id="status" class="status">准备好了。</div><main id="grid" class="grid"></main><div id="empty" class="empty" style="display:none">暂无商品</div><div id="moreWrap" class="more-wrap" style="display:none"><button id="moreBtn" class="more">加载更多</button></div><div class="foot">价格、优惠券和库存以平台页面为准。</div>
  </div>
  <nav class="nav"><button class="active" data-view="home"><b>⌂</b>首页</button><button data-view="history"><b>↺</b>历史</button><button data-view="fav"><b>★</b>收藏</button><button data-view="me"><b>•</b>我的</button></nav>
  <div id="modal" class="modal"><div class="sheet"><div class="sheet-head"><strong>商品详情</strong><button id="closeModal" class="close">×</button></div><div id="detail"></div></div></div><div id="toast" class="toast"></div>
<script>
const API_BASE='https://jiabibi-api.onrender.com';
const hotWords=['充电宝','纸巾','洗衣液','蓝牙耳机','手机壳','保温杯','猫粮','行李箱'];
const PAGE_SIZE=20;
let goods=[], sort='smart', view='home', platform='all', lastKeyword='充电宝', page=1, hasMore=true, loading=false;
const $=id=>document.getElementById(id);
const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');
const sales=s=>String(s||'').includes('万')?parseFloat(s)*10000:(parseInt(String(s||'').replace(/\D/g,''))||0);
const getLS=(k,d=[])=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};
const setLS=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const itemKey=item=>`${item.platform||'pdd'}:${item.goods_sign||item.sku_id||item.goods_id||item.material_url||item.goods_name}`;
const platformName=p=>p==='jd'?'京东':'拼多多';
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1700)}
function saveHistory(q){let a=getLS('history').filter(x=>x!==q);a.unshift(q);setLS('history',a.slice(0,20))}
function isFav(item){const key=itemKey(item);return getLS('favorites').some(x=>itemKey(x)===key)}
function toggleFav(item){let a=getLS('favorites');const key=itemKey(item);const has=a.some(x=>itemKey(x)===key);a=has?a.filter(x=>itemKey(x)!==key):[item,...a].slice(0,80);setLS('favorites',a);toast(has?'已取消收藏':'已收藏');render()}
function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：]+/g,'')}
function keywordParts(q){const s=norm(q);const parts=new Set();if(s)parts.add(s);for(let i=0;i<s.length;i++){for(let len=2;len<=Math.min(4,s.length-i);len++)parts.add(s.slice(i,i+len))}return [...parts].filter(x=>x.length>=2)}
function relevanceScore(item,q){const title=norm(item.goods_name), brand=norm(item.brand_name), shop=norm(item.shop_name), kw=norm(q);if(!kw)return 0;const parts=keywordParts(q);let score=0;if(title===kw)score+=1000;if(title.includes(kw))score+=520;if(title.startsWith(kw))score+=180;const pos=title.indexOf(kw);if(pos>=0)score+=Math.max(0,120-pos*8);if(brand.includes(kw)||shop.includes(kw))score+=120;let hit=0;for(const p of parts){if(title.includes(p)){hit++;score+=p.length*18}else if(brand.includes(p)||shop.includes(p))score+=p.length*7}score+=Math.min(180,hit*22);score+=item.has_coupon?35:0;score+=Number(item.coupon_discount_yuan||0)>0?Math.min(50,Number(item.coupon_discount_yuan||0)*2):0;score+=Math.min(45,Math.log10(sales(item.sales_tip)+1)*18);const price=Number(item.coupon_price_yuan||0);if(price>0)score+=Math.max(0,35-Math.log(price+1)*7);if((item.platform||'pdd')==='pdd')score+=platform==='all'?45:20;else score-=platform==='all'?70:0;return Math.round(score)}
function scored(item){return item._match_score??relevanceScore(item,lastKeyword)}
function sorted(list){const a=[...list];a.forEach(x=>x._match_score=relevanceScore(x,lastKeyword));if(sort==='price')a.sort((x,y)=>(x.coupon_price_yuan||0)-(y.coupon_price_yuan||0)||scored(y)-scored(x));else if(sort==='sales')a.sort((x,y)=>sales(y.sales_tip)-sales(x.sales_tip)||scored(y)-scored(x));else if(sort==='coupon')a.sort((x,y)=>(y.coupon_discount_yuan||0)-(x.coupon_discount_yuan||0)||scored(y)-scored(x));else a.sort((x,y)=>scored(y)-scored(x));return a}
function setStatus(s){$('status').textContent=s}
function showLoading(){const grid=$('grid');grid.innerHTML='';$('empty').style.display='none';$('moreWrap').style.display='none';for(let i=0;i<6;i++){const c=document.createElement('article');c.className='card';c.innerHTML='<div class="skeleton"></div>';grid.appendChild(c)}}
function card(item){const score=scored(item);const c=document.createElement('article');c.className='card';c.innerHTML=`<div class="pic"><img src="${item.goods_thumbnail_url||item.goods_image_url||''}" loading="lazy"><span class="badge">${platformName(item.platform)}</span><span class="score">相关 ${score}</span><button class="fav">${isFav(item)?'★':'☆'}</button></div><div class="info"><div class="title">${item.goods_name||''}</div><div class="meta"><span>${item.brand_name||platformName(item.platform)}</span><span>销量 ${item.sales_tip||'-'}</span></div><div class="coupon">券 ¥${yuan(item.coupon_discount_yuan)}</div><div class="price"><small>¥</small>${yuan(item.coupon_price_yuan)}</div><div class="old">¥${yuan(item.min_group_price_yuan)}</div><button class="buy">去购买</button></div>`;c.onclick=()=>openDetail(item);c.querySelector('.fav').onclick=e=>{e.stopPropagation();toggleFav(item)};c.querySelector('.buy').onclick=e=>{e.stopPropagation();buy(item)};return c}
function renderList(list,label){const grid=$('grid');grid.innerHTML='';const arr=sorted(list);$('empty').style.display=arr.length?'none':'block';setStatus(label||`共 ${arr.length} 个商品，已按关键词相关度排序。`);arr.forEach(x=>grid.appendChild(card(x)));$('moreWrap').style.display=(view==='home'&&arr.length&&hasMore)?'block':'none';$('moreBtn').disabled=loading;$('moreBtn').textContent=loading?'加载中...':'加载更多'}
function renderHistory(){const h=getLS('history');$('grid').innerHTML='';$('moreWrap').style.display='none';$('empty').style.display=h.length?'none':'block';setStatus('搜索历史');const p=document.createElement('section');p.className='panel';p.innerHTML='<button class="clear">清空</button><h2>最近搜索</h2><div class="history-list"></div>';p.querySelector('.clear').onclick=()=>{setLS('history',[]);renderHistory()};const box=p.querySelector('.history-list');h.forEach(w=>{const b=document.createElement('button');b.className='pill';b.textContent=w;b.onclick=()=>search(w);box.appendChild(b)});$('grid').appendChild(p)}
function renderMe(){$('grid').innerHTML='';$('moreWrap').style.display='none';$('empty').style.display='none';setStatus('我的');const p=document.createElement('section');p.className='panel';p.innerHTML='<h2>价比比 MVP</h2><p>已接入拼多多和京东，并加入关键词相关度排序。</p><p>下一步：淘宝审核通过后接入，再统一比价排序。</p>';$('grid').appendChild(p)}
function render(){$('hot').style.display=view==='home'?'block':'none';if(view==='history')return renderHistory();if(view==='fav')return renderList(getLS('favorites'),'我的收藏');if(view==='me')return renderMe();renderList(goods,goods.length?`“${lastKeyword}” 已加载 ${goods.length} 个商品，优先展示最相近结果。`:'准备好了。')}
async function fetchPlatform(p,q,pg){const r=await fetch(`${API_BASE}/api/${p}/search?keyword=${encodeURIComponent(q)}&page=${pg}&page_size=${PAGE_SIZE}`);const d=await r.json();if(!r.ok||d.error_response||d.jd_error)throw new Error(d.error_response?.sub_msg||d.jd_error?.message||d.message||'搜索失败');return d}
async function fetchPage(q,pg){if(platform==='pdd'||platform==='jd')return fetchPlatform(platform,q,pg);const [pdd,jd]=await Promise.allSettled([fetchPlatform('pdd',q,pg),fetchPlatform('jd',q,pg)]);let list=[];let total=0;let errs=[];if(pdd.status==='fulfilled'){list=list.concat(pdd.value.goods_list||[]);total+=Number(pdd.value.total_count||0)}else errs.push('拼多多');if(jd.status==='fulfilled'){list=list.concat(jd.value.goods_list||[]);total+=Number(jd.value.total_count||0)}else errs.push('京东');if(!list.length&&errs.length)throw new Error(errs.join('、')+'搜索失败');return {goods_list:list,total_count:total||list.length}}
async function search(q){q=(q||$('keyword').value||'').trim()||'充电宝';lastKeyword=q;page=1;hasMore=true;$('keyword').value=q;view='home';document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view==='home'));setStatus('搜索中...');showLoading();try{loading=true;const d=await fetchPage(q,page);goods=d.goods_list||[];goods.forEach(x=>x._match_score=relevanceScore(x,lastKeyword));hasMore=platform!=='all'&&goods.length<Number(d.total_count||goods.length);saveHistory(q);loading=false;render()}catch(e){loading=false;goods=[];$('grid').innerHTML='';$('moreWrap').style.display='none';$('empty').style.display='block';setStatus('搜索失败：'+e.message);toast('搜索失败')}}
async function loadMore(){if(loading||!hasMore)return;loading=true;page+=1;render();try{const d=await fetchPage(lastKeyword,page);const next=d.goods_list||[];next.forEach(x=>x._match_score=relevanceScore(x,lastKeyword));const seen=new Set(goods.map(itemKey));goods=goods.concat(next.filter(x=>!seen.has(itemKey(x))));hasMore=platform!=='all'&&goods.length<Number(d.total_count||goods.length)&&next.length>0;loading=false;render()}catch(e){page-=1;loading=false;render();toast('加载失败：'+e.message)}}
function openDetail(item){const tags=(item.unified_tags||[]).slice(0,8).map(t=>`<span class="tag">${t}</span>`).join('');$('detail').innerHTML=`<img class="detail-img" src="${item.goods_image_url||item.goods_thumbnail_url||''}"><div class="detail-body"><div class="detail-title">${item.goods_name||''}</div><div class="detail-row"><span>${platformName(item.platform)} · ${item.brand_name||''}</span><span>相关度 ${scored(item)}</span></div><div class="detail-price">¥${yuan(item.coupon_price_yuan)}</div><div class="old">原价 ¥${yuan(item.min_group_price_yuan)} · 优惠券 ¥${yuan(item.coupon_discount_yuan)}</div><div class="tags">${tags}</div><button class="detail-buy">去购买</button></div>`;$('detail').querySelector('.detail-buy').onclick=()=>buy(item);$('modal').classList.add('show')}
function closeDetail(){$('modal').classList.remove('show')}
async function buy(item){try{toast('正在生成购买链接...');let endpoint,body;if((item.platform||'pdd')==='jd'){endpoint='/api/jd/link';body={sku_id:item.sku_id,material_url:item.material_url,coupon_url:item.coupon_url}}else{endpoint='/api/pdd/link';body={goods_sign:item.goods_sign}}const r=await fetch(`${API_BASE}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok||d.error_response)throw new Error(d.error_response?.sub_msg||d.jd_error?.message||d.message||'生成失败');const link=d.mobile_short_url||d.short_url||d.mobile_url||d.click_url||d.url||d.schema_url;if(link)location.href=link;else toast('没有返回链接')}catch(e){toast('生成失败：'+e.message)}}
$('form').onsubmit=e=>{e.preventDefault();search()};$('moreBtn').onclick=loadMore;$('closeModal').onclick=closeDetail;$('modal').onclick=e=>{if(e.target.id==='modal')closeDetail()};document.querySelectorAll('#platforms button[data-platform]').forEach(b=>b.onclick=()=>{platform=b.dataset.platform;document.querySelectorAll('#platforms button').forEach(x=>x.classList.toggle('active',x===b));search(lastKeyword)});document.querySelectorAll('#sorts button').forEach(b=>b.onclick=()=>{sort=b.dataset.sort;document.querySelectorAll('#sorts button').forEach(x=>x.classList.toggle('active',x===b));render()});document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{view=b.dataset.view;document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x===b));render()});hotWords.forEach(w=>{const b=document.createElement('button');b.className='pill';b.textContent=w;b.onclick=()=>search(w);$('hotList').appendChild(b)});search('充电宝');
</script>
</body>
</html>
