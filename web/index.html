  <style>
    :root{--bg:#f5f5f7;--card:rgba(255,255,255,.9);--text:#1d1d1f;--muted:#86868b;--line:#e8e8ed;--blue:#0071e3;--shadow:0 18px 60px rgba(0,0,0,.08)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top,#fff 0,#f5f5f7 45%,#eee 100%);color:var(--text)}button,input{font:inherit}.app{max-width:980px;margin:0 auto;padding:18px 14px 40px}.hero{text-align:center;padding:34px 4px 18px}.logo{font-size:42px;font-weight:900;letter-spacing:-1.6px;margin:0}.sub{margin:8px auto 0;color:var(--muted);font-size:15px;line-height:1.5;max-width:620px}.search-card{margin:22px auto 0;background:var(--card);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.75);box-shadow:var(--shadow);border-radius:28px;padding:10px;display:flex;gap:8px;max-width:720px}.search-card input{flex:1;border:0;background:#fff;border-radius:20px;padding:15px 16px;font-size:16px;outline:0;box-shadow:inset 0 0 0 1px var(--line)}.search-card button{border:0;background:#111;color:#fff;border-radius:20px;padding:0 22px;font-weight:800;cursor:pointer}.chips{display:flex;gap:8px;overflow:auto;padding:14px 2px 0;justify-content:center}.chip{border:0;background:#fff;border-radius:999px;padding:8px 12px;color:#555;white-space:nowrap;box-shadow:0 3px 14px rgba(0,0,0,.05);cursor:pointer}.status{text-align:center;color:var(--muted);font-size:13px;padding:12px 0 14px}.summary-grid{display:grid;gap:14px}.deal-card{background:var(--card);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);border-radius:28px;padding:18px;backdrop-filter:blur(18px);min-height:166px}.deal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.deal-type{font-size:14px;color:var(--muted);font-weight:700}.deal-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-top:3px}.badge{font-size:12px;font-weight:800;border-radius:999px;padding:6px 9px;background:#f2f2f7;color:#555;white-space:nowrap}.badge.official{background:#fff1f0;color:#cf1322}.badge.channel{background:#eff6ff;color:#1d4ed8}.badge.normal{background:#f0fdf4;color:#15803d}.best{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:18px}.price{font-size:42px;font-weight:900;letter-spacing:-1.2px;line-height:1;color:#111}.price small{font-size:19px}.source{font-size:13px;color:var(--muted);line-height:1.45;margin-top:8px;max-width:520px}.spec{display:inline-block;margin-top:8px;background:#f5f5f7;border:1px solid var(--line);border-radius:12px;padding:6px 8px;color:#555;font-size:12px;font-weight:700}.hint{margin-top:8px;color:#8a8a8f;font-size:12px;line-height:1.45;max-width:560px}.buy{border:0;border-radius:999px;background:var(--blue);color:#fff;padding:11px 16px;font-weight:800;cursor:pointer;white-space:nowrap}.buy:disabled{background:#d1d1d6}.platforms{margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.p{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center;min-height:74px}.p-name{font-size:12px;color:var(--muted)}.p-price{font-size:17px;font-weight:900;margin-top:4px}.p-unit{font-size:11px;color:#777;margin-top:2px}.p-empty{font-size:12px;color:#b0b0b5;margin-top:6px;line-height:1.25}.note{margin:16px auto 0;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.85);border-radius:22px;padding:14px 16px;color:#6e6e73;font-size:13px;line-height:1.55}.loading{height:166px;border-radius:28px;background:linear-gradient(90deg,#eee,#fafafa,#eee);background-size:200% 100%;animation:shine 1.2s infinite}@keyframes shine{to{background-position:-200% 0}}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:10;max-width:86%;text-align:center}.empty{background:#fff;border-radius:28px;padding:34px 18px;text-align:center;color:var(--muted);box-shadow:var(--shadow);line-height:1.6}@media(min-width:760px){.deal-card{padding:22px}.logo{font-size:58px}.sub{font-size:17px}.price{font-size:54px}.app{padding-top:26px}}@media(max-width:520px){.search-card{border-radius:24px}.search-card button{padding:0 16px}.platforms{grid-template-columns:repeat(2,1fr)}.best{align-items:flex-start}.price{font-size:38px}.deal-title{font-size:22px}}

<body>
  <div class="app">
    <section class="hero">
      <h1 class="logo">价比比</h1>

      <form id="form" class="search-card"><input id="keyword" value="真零 酸奶" placeholder="搜索商品，或粘贴商品链接"><button>比价</button></form>

<script>
const API_BASE='https://jiabibi-api.onrender.com';
const hotWords=['真零 酸奶','百岁山','无糖可口可乐','维达纸巾','蓝月亮洗衣液','小米充电宝 20000毫安'];
const platforms=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];
const groupMeta={official:{title:'官方/自营最低价',desc:'官方旗舰、自营、品牌官方店里的最低价',hint:'当前接口未返回可识别为官方旗舰/自营的相关商品。'},channel:{title:'渠道店最低价',desc:'批发、源头、清仓、量贩、整箱渠道的最低价',hint:'当前接口未返回可识别为渠道/批发/源头/清仓的相关商品。'},normal:{title:'普通店最低价',desc:'非官方、非明显渠道的普通店最低价',hint:'当前接口未返回普通店相关商品。'}};
const groups=['official','channel','normal'];
const $=id=>document.getElementById(id);
const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');
const priceOf=item=>Number(item?.coupon_price_yuan||item?.min_group_price_yuan||999999);
let effectiveKeyword='真零 酸奶', providerState=[];
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1800)}
function norm(s){return String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'')}
function itemTitle(item){return String(item.goods_name||'')}
function itemText(item){return `${item.goods_name||''} ${item.brand_name||''} ${item.shop_name||''} ${(item.unified_tags||[]).join(' ')}`}
function hitsAny(text,arr){const t=norm(text);return arr.some(x=>t.includes(norm(x)))}
const brandDict={xiaomi:['小米','xiaomi','redmi','米家'],anker:['安克','anker'],vinda:['维达','vinda'],blue:['蓝月亮'],apple:['苹果','apple','iphone'],huawei:['华为','huawei'],coke:['可口可乐','coca-cola','cocacola','coca','cola'],sprite:['雪碧','sprite'],fanta:['芬达','fanta'],pepsi:['百事','pepsi'],ganten:['百岁山','ganten'],zhenling:['真零']};
const beverageBrandKeys=['coke','sprite','fanta','pepsi','ganten'];
const catDict={power:['充电宝','移动电源','mah','毫安','mAh','w','W','快充'],paper:['纸巾','抽纸','卷纸','面巾纸','抽','张','包','提'],laundry:['洗衣液','洗衣凝珠','洗衣粉','kg','g','斤','l','L','升'],dairy:['酸奶','牛奶','乳制品','乳品','低温酸奶','常温酸奶','风味发酵乳','发酵乳','乳糖','蛋白牛乳','蛋白','代餐','奶'],case:['手机壳','保护壳','壳','硅胶壳'],earphone:['耳机','蓝牙耳机'],beverage:['饮料','汽水','碳酸','可乐','雪碧','芬达','果汁','茶饮料','矿泉水','纯净水','能量饮料','矿泉','矿物质水','天然水','饮用水','水','ml','毫升','瓶','罐','整箱']};
const attrDict={noSugar:['无糖','零糖','0糖','零度','zero','零卡','0卡','无蔗糖','0蔗糖'],lowSugar:['低糖','少糖'],caffeineFree:['无咖啡因','脱咖啡因'],lactoseFree:['0乳糖','无乳糖','零乳糖']};
const hardExcludes=['刻字','激光','礼物','礼盒','摆件','挂件','钥匙扣','贴纸','海报','模型','手办','空瓶','收藏','周边','定制','抱枕','衣服','杯子','水杯','开瓶器','配件','适用','兼容'];
const officialWords=['官方旗舰店','品牌旗舰店','旗舰店','官方店','官方商城','官方旗舰','京东自营','自营'];
const channelWords=['渠道','批发','厂家','工厂','源头','代购','尾货','清仓','仓库','仓储','量贩','整箱批发','批发价','团购','特卖','底价','大包装','商用'];
const caseModels=['iphone15promax','iphone15pro','iphone15plus','iphone15','iphone14promax','iphone14pro','iphone14plus','iphone14','小米14ultra','小米14pro','小米14','华为mate60pro','华为mate60','华为pura70','华为p70'];
function detectIntent(q){const nq=norm(q);const brandKeys=[];for(const [key,arr] of Object.entries(brandDict)){if(arr.some(x=>nq.includes(norm(x))))brandKeys.push(key)}const catKeys=[];for(const [key,arr] of Object.entries(catDict)){if(arr.some(x=>nq.includes(norm(x))))catKeys.push(key)}if(brandKeys.some(k=>beverageBrandKeys.includes(k))&&!catKeys.includes('beverage'))catKeys.push('beverage');const attrs=[];for(const [key,arr] of Object.entries(attrDict)){if(arr.some(x=>nq.includes(norm(x))))attrs.push(key)}const model=caseModels.find(m=>nq.includes(norm(m)))||'';const cap=(nq.match(/(\d{4,6})(?:mah|毫安)/)||[])[1]||'';const watt=(nq.match(/(\d{2,3})w/)||[])[1]||'';return {brandKeys,catKeys,attrs,model,cap,watt,wantsBeverage:catKeys.includes('beverage'),wantsPaper:catKeys.includes('paper'),wantsLaundry:catKeys.includes('laundry'),wantsDairy:catKeys.includes('dairy'),wantsPower:catKeys.includes('power'),wantsCase:catKeys.includes('case')}}
function categoryOk(item,intent){if(!intent.catKeys.length)return true;return intent.catKeys.some(k=>hitsAny(itemText(item),catDict[k]))}
function attrOk(item,intent){if(!intent.attrs.length)return true;return intent.attrs.every(k=>hitsAny(itemText(item),attrDict[k]))}
function brandOk(item,intent){if(!intent.brandKeys.length)return true;return intent.brandKeys.some(k=>hitsAny(itemTitle(item),brandDict[k])&&hitsAny(itemText(item),brandDict[k]))}
function looseQueryOk(item,q,intent){if(intent.brandKeys.length||intent.catKeys.length)return true;const tokens=String(q).split(/[\s\u3000]+/).map(norm).filter(x=>x.length>=2);if(tokens.length)return tokens.every(t=>norm(itemText(item)).includes(t));const qn=norm(q);return qn.length<2||norm(itemText(item)).includes(qn.slice(0,Math.min(4,qn.length)))}
function unitToMl(v,u){u=String(u||'').toLowerCase();return (u==='l'||u==='升')?v*1000:v}
function unitToKg(v,u){u=String(u||'').toLowerCase();if(u==='kg'||u==='公斤')return v;if(u==='斤')return v*0.5;return v/1000}
function parseBeverage(item){const text=itemText(item).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml');const price=priceOf(item);let ml=0,count=0,container='件',estimated=false;const set=(vol,u,c,ct)=>{ml=unitToMl(Number(vol),u);count=Number(c);container=ct||container};let m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)\s*[*]\s*(\d+)\s*(瓶|罐|听)?/);if(m)set(m[1],m[2],m[3],m[4]);if(!count){m=text.match(/(\d+)\s*(瓶|罐|听).{0,8}?(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)/);if(m)set(m[3],m[4],m[1],m[2])}if(!count){m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升).{0,12}?(\d+)\s*(瓶|罐|听)/);if(m)set(m[1],m[2],m[3],m[4])}if(!ml){m=text.match(/(\d+(?:\.\d+)?)\s*(ml|ML|mL|l|L|升)/);if(m)ml=unitToMl(Number(m[1]),m[2])}if(!count){m=text.match(/(\d+)\s*(瓶|罐|听)/);if(m){count=Number(m[1]);container=m[2]}}if(ml&&!count){count=1;estimated=true;container=/罐|听/.test(text)?'罐':'瓶'}const totalMl=ml&&count?ml*count:0;return {kind:'beverage',ml,count,container,totalMl,estimated,unit:totalMl?price/(totalMl/100):null,piece:count?price/count:null}}
function parsePaper(item){const text=itemText(item).replace(/[×ＸxX]/g,'*');const price=priceOf(item);let draws=0,packs=0,layers=0;let m=text.match(/(\d+)\s*(抽|张)\s*[*]\s*(\d+)\s*(包|提|箱|组)?/);if(m){draws=Number(m[1]);packs=Number(m[3])}if(!packs){m=text.match(/(\d+)\s*(包|提|箱).{0,8}?(\d+)\s*(抽|张)/);if(m){packs=Number(m[1]);draws=Number(m[3])}}if(!draws){m=text.match(/(\d+)\s*(抽|张)/);if(m)draws=Number(m[1])}if(!packs){m=text.match(/(\d+)\s*(包|提|箱)/);if(m)packs=Number(m[1])}m=text.match(/(\d+)\s*层/);if(m)layers=Number(m[1]);const total=draws&&packs?draws*packs:0;return {kind:'paper',draws,packs,layers,total,unit:total?price/(total/100):null,piece:packs?price/packs:null}}
function parseLaundry(item){const text=itemText(item).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml');const price=priceOf(item);let kg=0,l=0,count=1,container='件';let m=text.match(/(\d+(?:\.\d+)?)\s*(kg|KG|公斤|斤|g|G|克|ml|ML|mL|l|L|升)\s*[*]\s*(\d+)\s*(瓶|袋|桶|件)?/);if(m){count=Number(m[3]);container=m[4]||container;if(/ml|ML|mL|l|L|升/.test(m[2]))l=unitToMl(Number(m[1]),m[2])/1000*count;else kg=unitToKg(Number(m[1]),m[2])*count}if(!kg&&!l){m=text.match(/(\d+(?:\.\d+)?)\s*(kg|KG|公斤|斤|g|G|克|ml|ML|mL|l|L|升)/);if(m){if(/ml|ML|mL|l|L|升/.test(m[2]))l=unitToMl(Number(m[1]),m[2])/1000;else kg=unitToKg(Number(m[1]),m[2])}}if(count===1){m=text.match(/(\d+)\s*(瓶|袋|桶)/);if(m){count=Number(m[1]);container=m[2]}}return {kind:'laundry',kg,l,count,container,unit:kg?price/kg:(l?price/l:null),piece:count?price/count:null}}
function parseDairy(item){const text=itemText(item).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml');const price=priceOf(item);let kg=0,l=0,count=1,container='件';let m=text.match(/(\d+(?:\.\d+)?)\s*(kg|KG|公斤|斤|g|G|克|ml|ML|mL|l|L|升)\s*[*]\s*(\d+)\s*(桶|瓶|盒|杯|袋|件)?/);if(m){count=Number(m[3]);container=m[4]||container;if(/ml|ML|mL|l|L|升/.test(m[2]))l=unitToMl(Number(m[1]),m[2])/1000*count;else kg=unitToKg(Number(m[1]),m[2])*count}if(!kg&&!l){m=text.match(/(\d+(?:\.\d+)?)\s*(kg|KG|公斤|斤|g|G|克|ml|ML|mL|l|L|升)/);if(m){if(/ml|ML|mL|l|L|升/.test(m[2]))l=unitToMl(Number(m[1]),m[2])/1000;else kg=unitToKg(Number(m[1]),m[2])}}if(count===1){m=text.match(/(\d+)\s*(桶|瓶|盒|杯|袋)/);if(m){count=Number(m[1]);container=m[2]}}return {kind:'dairy',kg,l,count,container,unit:kg?price/kg:(l?price/l:null),piece:count?price/count:null}}
function parsePower(item){const text=norm(itemText(item));const price=priceOf(item);const cap=Number((text.match(/(\d{4,6})(?:mah|毫安)/)||[])[1]||0);const watt=Number((text.match(/(\d{2,3})w/)||[])[1]||0);return {kind:'power',cap,watt,unit:cap?price/(cap/10000):null,piece:null}}
function parseCase(item){const text=norm(itemText(item));const model=caseModels.find(m=>text.includes(norm(m)))||'';return {kind:'case',model,unit:priceOf(item),piece:null}}
function parseSpec(item,q){const intent=detectIntent(q);if(intent.wantsBeverage)return parseBeverage(item);if(intent.wantsPaper)return parsePaper(item);if(intent.wantsLaundry)return parseLaundry(item);if(intent.wantsDairy)return parseDairy(item);if(intent.wantsPower)return parsePower(item);if(intent.wantsCase)return parseCase(item);return parseBeverage(item)}
function specText(item,q){const s=parseSpec(item,q);const parts=[];if(s.kind==='beverage'){if(s.ml&&s.count)parts.push(`${s.ml}ml × ${s.count}${s.container||'件'}${s.estimated?'（按单瓶估算）':''}`);if(s.piece)parts.push(`约 ¥${yuan(s.piece)}/${s.container||'件'}`);if(s.unit)parts.push(`约 ¥${yuan(s.unit)}/100ml${s.estimated?'（估算）':''}`)}else if(s.kind==='paper'){if(s.draws&&s.packs)parts.push(`${s.draws}抽 × ${s.packs}包`);if(s.layers)parts.push(`${s.layers}层`);if(s.unit)parts.push(`约 ¥${yuan(s.unit)}/100抽`);if(s.piece)parts.push(`约 ¥${yuan(s.piece)}/包`)}else if(s.kind==='laundry'){if(s.kg)parts.push(`${yuan(s.kg)}kg`);if(s.l)parts.push(`${yuan(s.l)}L`);if(s.count>1)parts.push(`${s.count}${s.container}`);if(s.unit)parts.push(`约 ¥${yuan(s.unit)}/${s.kg?'kg':'L'}`)}else if(s.kind==='dairy'){if(s.kg)parts.push(`${yuan(s.kg)}kg`);if(s.l)parts.push(`${yuan(s.l)}L`);if(s.count>1)parts.push(`${s.count}${s.container}`);if(s.unit)parts.push(`约 ¥${yuan(s.unit)}/${s.kg?'kg':'L'}`);if(s.piece&&s.count>1)parts.push(`约 ¥${yuan(s.piece)}/${s.container||'件'}`)}else if(s.kind==='power'){if(s.cap)parts.push(`${s.cap}mAh`);if(s.watt)parts.push(`${s.watt}W`);if(s.unit)parts.push(`约 ¥${yuan(s.unit)}/万mAh`)}else if(s.kind==='case'){if(s.model)parts.push(`适配 ${s.model}`)}return parts.join('｜')}
function strictRelevant(item,q){const intent=detectIntent(q), text=itemText(item), ntext=norm(text);if(hardExcludes.some(x=>ntext.includes(norm(x))))return false;if(intent.wantsBeverage&&['电池','口罩','防晒','遮阳','台灯','灯具','手机壳','保护壳'].some(x=>ntext.includes(norm(x))))return false;if(!brandOk(item,intent)||!categoryOk(item,intent)||!attrOk(item,intent))return false;const spec=parseSpec(item,q);if(intent.wantsBeverage&&!spec.unit)return false;if(intent.wantsPaper&&!spec.unit)return false;if(intent.wantsLaundry&&!spec.unit)return false;if(intent.wantsDairy&&!spec.unit)return false;if(intent.wantsPower){if(intent.cap&&spec.cap&&Math.abs(spec.cap-Number(intent.cap))>1000)return false;if(intent.watt&&spec.watt&&spec.watt<Number(intent.watt))return false}if(intent.wantsCase&&intent.model&&spec.model!==intent.model)return false;return looseQueryOk(item,q,intent)}
function score(item,q){const intent=detectIntent(q), title=itemTitle(item), text=itemText(item);let s=0;for(const k of intent.brandKeys){if(hitsAny(title,brandDict[k]))s+=600;if(hitsAny(text,brandDict[k]))s+=150}for(const k of intent.catKeys){if(hitsAny(title,catDict[k]))s+=220;else if(hitsAny(text,catDict[k]))s+=80}for(const k of intent.attrs){if(hitsAny(title,attrDict[k]))s+=500;else if(hitsAny(text,attrDict[k]))s+=200}if(norm(title).includes(norm(q)))s+=800;return s}
function compareValue(item,q){const s=parseSpec(item,q);return s.unit||s.piece||priceOf(item)}
function channelType(item){const text=itemText(item);if(hitsAny(text,officialWords))return 'official';if(hitsAny(text,channelWords))return 'channel';return 'normal'}
function best(list,q,type,platform){return list.filter(x=>x.platform===platform&&channelType(x)===type&&strictRelevant(x,q)).sort((a,b)=>compareValue(a,q)-compareValue(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function bestAcross(list,q,type){return platforms.map(([p])=>best(list,q,type,p)).filter(Boolean).sort((a,b)=>compareValue(a,q)-compareValue(b,q)||score(b,q)-score(a,q)||priceOf(a)-priceOf(b))[0]||null}
function showLoading(){const s=$('summary');s.innerHTML='';for(let i=0;i<3;i++){const d=document.createElement('div');d.className='loading';s.appendChild(d)}}
function platformEmptyLabel(platform){const st=providerState.find(x=>x.platform===platform);if(st&&st.source==='provider_placeholder')return '待接入';return '未返回/未识别'}
function platformMini(list,q,type){return `<div class="platforms">${platforms.map(([p,n])=>{const item=best(list,q,type,p);const spec=item?specText(item,q):'';return `<div class="p"><div class="p-name">${n}</div>${item?`<div class="p-price">¥${yuan(priceOf(item))}</div><div class="p-unit">${spec.split('｜').slice(-1)[0]||''}</div>`:`<div class="p-empty">${platformEmptyLabel(p)}</div>`}</div>`}).join('')}</div>`}
function card(type,item,list,q){const meta=groupMeta[type], platform=item?platforms.find(x=>x[0]===item.platform)?.[1]:'';const spec=item?specText(item,q):'';return `<section class="deal-card"><div class="deal-head"><div><div class="deal-type">${meta.desc}</div><div class="deal-title">${meta.title}</div></div><div class="badge ${type}">${platform||'暂无'}</div></div><div class="best"><div>${item?`<div class="price"><small>¥</small>${yuan(priceOf(item))}</div><div class="source">${platform} · ${item.shop_name||item.brand_name||''}<br>${item.goods_name||''}</div>${spec?`<div class="spec">${spec}</div>`:''}`:`<div class="price"><small>¥</small>--</div><div class="source">${meta.hint}</div><div class="hint">这通常是接口覆盖问题，不代表平台上绝对没有该店型。</div>`}</div><button class="buy" ${item?`data-key="${item._key}"`:''} ${item?'':'disabled'}>去购买</button></div>${platformMini(list,q,type)}</section>`}
function render(list,q=effectiveKeyword,providers=[]){providerState=providers||[];const filtered=list.filter(x=>strictRelevant(x,q));const keyed={};filtered.forEach((x,i)=>{x._key='k'+i;keyed[x._key]=x});window.__goods=keyed;const s=$('summary');s.innerHTML='';if(!filtered.length){s.innerHTML='<div class="empty">暂无可靠匹配。为了避免错品，已过滤掉不满足品牌、品类、强属性或规格的结果。</div>';return}for(const type of groups){const item=bestAcross(filtered,q,type);s.insertAdjacentHTML('beforeend',card(type,item,filtered,q))}document.querySelectorAll('.buy[data-key]').forEach(b=>b.onclick=e=>buy(window.__goods[e.target.dataset.key]));}
async function search(v){const raw=(v||$('keyword').value||'').trim()||'真零 酸奶';$('keyword').value=raw;$('status').textContent='正在比价...';showLoading();try{const r=await fetch(`${API_BASE}/api/search?keyword=${encodeURIComponent(raw)}&platform=all&page_size=50`);const d=await r.json();if(!r.ok||d.error)throw new Error(d.message||d.error||'搜索失败');effectiveKeyword=d.keyword||raw;render(d.goods_list||[],effectiveKeyword,d.providers||[]);$('status').textContent=`“${effectiveKeyword}” 已按规格规则库、店型和单位价汇总。`}catch(e){$('summary').innerHTML='<div class="empty">搜索失败：'+e.message+'</div>';$('status').textContent='搜索失败'}}
async function buy(item){if(!item)return;try{toast('正在生成购买链接...');let endpoint,body;if(item.platform==='jd'){endpoint='/api/jd/link';body={sku_id:item.sku_id,material_url:item.material_url,coupon_url:item.coupon_url}}else if(item.platform==='pdd'){endpoint='/api/pdd/link';body={goods_sign:item.goods_sign}}else{toast('该平台真实转链未接入');return}const r=await fetch(`${API_BASE}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok||d.error_response)throw new Error(d.error_response?.sub_msg||d.jd_error?.message||d.message||'生成失败');const link=d.mobile_short_url||d.short_url||d.mobile_url||d.click_url||d.url||d.schema_url;if(link)location.href=link;else toast('没有返回链接')}catch(e){toast('生成失败：'+e.message)}}
$('form').onsubmit=e=>{e.preventDefault();search()};hotWords.forEach(w=>{const b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=()=>search(w);$('chips').appendChild(b)});search('真零 酸奶');
</script>
</body>
</html>
