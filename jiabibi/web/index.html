<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>价比比 Jiabibi</title>
  <style>
    :root{--blue:#0f4c81;--green:#19b66a;--bg:#f5f8fb;--card:#fff;--text:#172033;--muted:#7b8794;--line:#e7edf3;--danger:#ff5a5f;}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:78px}.app{max-width:1120px;margin:0 auto;min-height:100vh}.hero{position:sticky;top:0;z-index:10;padding:18px 16px 14px;background:linear-gradient(135deg,#0f4c81,#147f8c 58%,#19b66a);color:white;border-radius:0 0 26px 26px;box-shadow:0 10px 28px rgba(15,76,129,.16)}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:15px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-weight:900;font-size:21px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.22)}.brand h1{font-size:22px;line-height:1;margin:0}.brand p{font-size:12px;margin:4px 0 0;opacity:.85}.pill{font-size:12px;background:rgba(255,255,255,.18);padding:8px 10px;border-radius:999px}.searchBox{display:flex;gap:10px;background:#fff;border-radius:18px;padding:8px;box-shadow:0 12px 24px rgba(0,0,0,.12)}.searchBox input{flex:1;border:0;outline:0;font-size:16px;padding:11px 10px;border-radius:12px;min-width:0}.searchBox button,.buyBtn,.smallBtn{border:0;background:linear-gradient(135deg,var(--green),#12a65d);color:#fff;border-radius:14px;padding:0 18px;font-weight:800;cursor:pointer}.tabs,.sorts{display:flex;gap:9px;overflow-x:auto;padding:14px 16px 0}.tab,.sort{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;color:#344054;white-space:nowrap;cursor:pointer}.tab.active,.sort.active{background:#eaf8f1;color:#078245;border-color:#9de1bd;font-weight:800}.section{padding:14px 16px}.panel{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 8px 22px rgba(23,32,51,.04)}.panelTitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.panelTitle h2{font-size:16px;margin:0}.linkish{border:0;background:transparent;color:var(--muted);cursor:pointer}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:0;background:#f0f5f8;border-radius:999px;padding:9px 12px;cursor:pointer}.grid{columns:2 260px;column-gap:14px}.card{break-inside:avoid;background:var(--card);border:1px solid var(--line);border-radius:22px;margin:0 0 14px;overflow:hidden;box-shadow:0 9px 22px rgba(23,32,51,.05)}.imgWrap{position:relative;background:#eef3f7}.card img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover}.fav{position:absolute;right:10px;top:10px;border:0;border-radius:999px;width:38px;height:38px;background:rgba(255,255,255,.92);box-shadow:0 6px 16px rgba(0,0,0,.12);cursor:pointer;font-size:20px}.fav.on{color:#ffb000}.body{padding:12px}.title{font-size:14px;line-height:1.45;margin:0 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.meta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.priceRow{display:flex;align-items:flex-end;gap:8px;margin:8px 0}.price{font-size:22px;font-weight:900;color:#e5484d}.old{font-size:12px;color:var(--muted);text-decoration:line-through}.coupon{font-size:12px;color:#b54708;background:#fff4e5;border:1px solid #ffd8a8;border-radius:8px;padding:3px 6px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.tag{font-size:11px;background:#eef8ff;color:#0f4c81;border-radius:7px;padding:3px 6px}.buyBtn{width:100%;height:42px;margin-top:8px}.empty{padding:28px 16px;text-align:center;color:var(--muted)}.notice{font-size:12px;color:var(--muted);text-align:center;padding:10px 16px 24px}.bottomNav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(520px,calc(100% - 24px));display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:24px;box-shadow:0 12px 36px rgba(23,32,51,.16);backdrop-filter:blur(12px);z-index:20;overflow:hidden}.navItem{border:0;background:transparent;padding:10px 4px;color:var(--muted);font-size:12px;cursor:pointer}.navItem b{display:block;font-size:20px;margin-bottom:2px}.navItem.active{color:var(--green);font-weight:800}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#172033;color:#fff;padding:10px 14px;border-radius:999px;opacity:0;transition:.25s;z-index:99}.toast.show{opacity:1}.loading{padding:30px;text-align:center;color:var(--muted)}.hidden{display:none!important}@media(max-width:640px){.grid{columns:2 160px;column-gap:10px}.hero{border-radius:0 0 22px 22px}.brand h1{font-size:20px}.searchBox button{padding:0 14px}.section{padding:12px 10px}.card{border-radius:18px}.body{padding:10px}.price{font-size:19px}.pill{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="topbar">
        <div class="brand"><div class="logo">比</div><div><h1>价比比</h1><p>AI 搜索优惠，先从拼多多跑通</p></div></div>
        <div class="pill">MVP v4</div>
      </div>
      <form class="searchBox" id="searchForm"><input id="keywordInput" placeholder="搜充电宝、纸巾、耳机..." autocomplete="off" /><button type="submit">搜索</button></form>
    </header>
    <nav class="tabs"><button class="tab active" data-platform="pdd">拼多多</button><button class="tab" data-platform="taobao">淘宝 待接入</button><button class="tab" data-platform="jd">京东 待接入</button></nav>
    <div class="sorts"><button class="sort active" data-sort="default">综合</button><button class="sort" data-sort="price">券后价</button><button class="sort" data-sort="sales">销量</button><button class="sort" data-sort="coupon">优惠券</button></div>
    <main id="main"></main>
    <div class="notice">价格、优惠券、库存以拼多多最终页面为准。价比比仅做搜索与跳转辅助。</div>
  </div>
  <nav class="bottomNav"><button class="navItem active" data-page="home"><b>⌂</b>首页</button><button class="navItem" data-page="history"><b>↺</b>历史</button><button class="navItem" data-page="favorites"><b>★</b>收藏</button><button class="navItem" data-page="mine"><b>☻</b>我的</button></nav>
  <div class="toast" id="toast"></div>
  <script>
    const API_BASE = 'http://localhost:3000';
    const state = { page:'home', platform:'pdd', sort:'default', keyword:'', goods:[], loading:false };
    const main = document.getElementById('main');
    const input = document.getElementById('keywordInput');
    const toastEl = document.getElementById('toast');
    const hotWords = ['充电宝','抽纸','蓝牙耳机','手机壳','行李箱','洗衣液','猫粮','键盘'];
    const money = cents => ((Number(cents||0))/100).toFixed(2);
    const afterCoupon = g => Math.max(0, Number(g.min_group_price||0) - Number(g.coupon_discount||0));
    const getList = key => JSON.parse(localStorage.getItem(key) || '[]');
    const setList = (key,val) => localStorage.setItem(key, JSON.stringify(val.slice(0,50)));
    function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),1800); }
    function saveHistory(k){ if(!k) return; const arr=getList('jiabibi_history').filter(x=>x!==k); arr.unshift(k); setList('jiabibi_history',arr); }
    function favKey(g){ return g.goods_sign || String(g.goods_id); }
    function isFav(g){ return getList('jiabibi_favorites').some(x=>x.key===favKey(g)); }
    function toggleFav(g){ const key=favKey(g); let arr=getList('jiabibi_favorites'); if(arr.some(x=>x.key===key)){ arr=arr.filter(x=>x.key!==key); toast('已取消收藏'); } else { arr.unshift({key, goods:g, time:Date.now()}); toast('已收藏'); } setList('jiabibi_favorites',arr); render(); }
    function parseSales(s){ if(!s) return 0; const str=String(s); const n=parseFloat(str); return str.includes('万') ? n*10000 : n; }
    function sortedGoods(list){ const arr=[...list]; if(state.sort==='price') arr.sort((a,b)=>afterCoupon(a)-afterCoupon(b)); if(state.sort==='sales') arr.sort((a,b)=>parseSales(b.sales_tip)-parseSales(a.sales_tip)); if(state.sort==='coupon') arr.sort((a,b)=>Number(b.coupon_discount||0)-Number(a.coupon_discount||0)); return arr; }
    async function search(keyword){ if(state.platform!=='pdd'){ toast('这个平台还没接入，先用拼多多'); return; } state.keyword=keyword.trim(); if(!state.keyword) return; state.loading=true; render(); saveHistory(state.keyword); try{ const res=await fetch(`${API_BASE}/api/pdd/search?keyword=${encodeURIComponent(state.keyword)}`); const data=await res.json(); if(!res.ok || data.error) throw new Error(data.message || JSON.stringify(data.error)); state.goods = data.goods_list || data.goods || data.data || []; state.page='home'; }catch(e){ main.innerHTML=`<div class="empty">搜索失败：${e.message}<br><br>确认 jiabibi-api/start.bat 后端黑窗口还开着。</div>`; return; } finally{ state.loading=false; render(); } }
    async function buy(g){ try{ toast('正在生成购买链接...'); const res=await fetch(`${API_BASE}/api/pdd/link`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goods_sign:g.goods_sign})}); const data=await res.json(); const url=data.mobile_short_url || data.short_url || data.mobile_url || data.url || data.schema_url; if(!url) throw new Error('没有返回购买链接'); window.open(url,'_blank'); }catch(e){ toast('生成链接失败'); console.error(e); } }
    function card(g){ const tags=(g.unified_tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join(''); return `<article class="card"><div class="imgWrap"><img src="${g.goods_thumbnail_url||g.goods_image_url||''}" alt=""><button class="fav ${isFav(g)?'on':''}" onclick='toggleFav(${JSON.stringify(g).replaceAll("'","&#39;")})'>★</button></div><div class="body"><p class="title">${g.goods_name||''}</p><div class="meta"><span>${g.brand_name||'拼多多'}</span><span>销量 ${g.sales_tip||'-'}</span></div><div class="priceRow"><span class="price">¥${money(afterCoupon(g))}</span><span class="old">¥${money(g.min_group_price)}</span></div>${g.coupon_discount?`<span class="coupon">券 ¥${money(g.coupon_discount)}</span>`:''}<div class="tags">${tags}</div><button class="buyBtn" onclick='buy(${JSON.stringify(g).replaceAll("'","&#39;")})'>去购买</button></div></article>`; }
    function renderHome(){ if(state.loading){ main.innerHTML='<div class="loading">正在搜索优惠商品...</div>'; return; } if(!state.goods.length){ main.innerHTML=`<section class="section"><div class="panel"><div class="panelTitle"><h2>热门搜索</h2></div><div class="chips">${hotWords.map(w=>`<button class="chip" onclick="input.value='${w}';search('${w}')">${w}</button>`).join('')}</div></div></section><div class="empty">输入关键词，开始搜索拼多多商品</div>`; return; } main.innerHTML=`<section class="section"><div class="grid">${sortedGoods(state.goods).map(card).join('')}</div></section>`; }
    function renderHistory(){ const arr=getList('jiabibi_history'); main.innerHTML=`<section class="section"><div class="panel"><div class="panelTitle"><h2>搜索历史</h2><button class="linkish" onclick="localStorage.removeItem('jiabibi_history');render()">清空</button></div><div class="chips">${arr.length?arr.map(w=>`<button class="chip" onclick="state.page='home';input.value='${w}';search('${w}')">${w}</button>`).join(''):'暂无搜索历史'}</div></div></section>`; }
    function renderFavs(){ const arr=getList('jiabibi_favorites').map(x=>x.goods); main.innerHTML=arr.length?`<section class="section"><div class="grid">${arr.map(card).join('')}</div></section>`:'<div class="empty">还没有收藏商品，点商品右上角星星收藏。</div>'; }
    function renderMine(){ main.innerHTML=`<section class="section"><div class="panel"><h2>我的</h2><p>当前版本：MVP v4</p><p>已接入：拼多多搜索、推广链接、收藏、历史搜索。</p><p>下一步：接淘宝/京东 API，做多平台比价。</p></div></section>`; }
    function render(){ document.querySelectorAll('.navItem').forEach(b=>b.classList.toggle('active',b.dataset.page===state.page)); if(state.page==='home') renderHome(); if(state.page==='history') renderHistory(); if(state.page==='favorites') renderFavs(); if(state.page==='mine') renderMine(); }
    document.getElementById('searchForm').addEventListener('submit',e=>{e.preventDefault(); state.page='home'; search(input.value);});
    document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.platform=b.dataset.platform;if(state.platform!=='pdd')toast('淘宝/京东按钮先占位，后面接 API');});
    document.querySelectorAll('.sort').forEach(b=>b.onclick=()=>{document.querySelectorAll('.sort').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.sort=b.dataset.sort;render();});
    document.querySelectorAll('.navItem').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render();});
    render();
  </script>
</body>
</html>
